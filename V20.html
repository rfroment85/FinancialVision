                sign: (b.cpTotal+b.provTotal+b.detteFin)-b.totalActifImmo,
              },
              {
                l:'Besoin en FR (BFR)',
                v:fmt((b.stocks+b.clients+b.creancesExp+b.creanceFisc)-(b.detteFrs+b.detteSoc+b.detteFisc),true),
                tip:'(Stocks + Créances exploit.) − Dettes exploitation · BFR < FR = tréso positive',
                color:C.teal,
                sign: (b.stocks+b.clients+b.creancesExp+b.creanceFisc)-(b.detteFrs+b.detteSoc+b.detteFisc),
              },
              {
                l:'Autonomie financière',
                v:b.totalPassif>0?(b.cpTotal/b.totalPassif*100).toFixed(1)+'%':'—',
                tip:'CP / Total passif · Seuil sain > 30%',
                color:C.gold,
                sign: b.cpTotal,
              },
              {
                l:'Liquidité générale',
                v:dettesCT>0?(b.totalActifCirc/dettesCT).toFixed(2)+'x':'—',
                tip:'Actif circulant / Dettes CT · Seuil sain > 1 — dettes CT = frs + social + fiscal + autres',
                color:C.green,
                sign: b.totalActifCirc - dettesCT,
              },
            ];
            return ratios.map((r,i)=>(
              <div key={i} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px',position:'relative',overflow:'hidden'}}>

                <div style={{fontSize:10,color:C.sub,fontWeight:600,marginBottom:6}}>{r.l}</div>
                <div style={{fontSize:18,fontWeight:800,fontFamily:"'DM Mono'",color:r.sign>=0?r.color:C.red}}>{r.v}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:4,fontStyle:'italic',lineHeight:1.4}}>{r.tip}</div>
              </div>
            ));
          })()}
        </div>
      </div>

      {/* ── Drill panel bilan ─────────────────────────────────────── */}
      {bilanDrill&&(
        <>
          <div onClick={()=>setBilanDrill(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:199,backdropFilter:'blur(2px)'}}/>
          <DrillPanel
            entries={entries}
            sigRow={{label:bilanDrill.label,prefixes:bilanDrill.prefixes,sign:'debit',net:bilanDrill.net}}
            dn={dn}
            onClose={()=>setBilanDrill(null)}
          />
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════ KPI CARD ════════════════════════════════
function KPICard({label,value,prev,color,emoji,refCA,delay}){
  const e=evol(value,prev);
  const up=e!==null&&parseFloat(e)>=0;
  return(
    <div className="fu" style={{animationDelay:`${delay||0}ms`,background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,position:'relative',overflow:'hidden',transition:'border-color .2s,box-shadow .2s'}}>
      <div style={{position:'absolute',inset:0,background:`radial-gradient(circle at 80% 20%, ${color}18, transparent 65%)`,pointerEvents:'none'}}/>
      <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}}>{label}</div>
      <div style={{fontSize:27,fontWeight:700,fontFamily:"'DM Mono'",color:C.text,marginBottom:10,letterSpacing:'-1px'}}>{fmt(value,true)}</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        {refCA&&<span style={{fontSize:11,color,fontWeight:700,background:`${color}18`,padding:'2px 9px',borderRadius:20}}>{pct(value,refCA)} CA</span>}
        {e!==null&&<span style={{fontSize:11,color:up?C.green:C.red,fontWeight:700}}>{up?'▲':'▼'} {Math.abs(e)}%</span>}
        {prev!==undefined&&prev!==null&&!isNaN(prev)&&<span style={{fontSize:11,color:C.muted}}>vs {fmt(prev,true)}</span>}
      </div>
      <div style={{position:'absolute',top:14,right:14,fontSize:24,opacity:0.18}}>{emoji}</div>
    </div>
  );
}

// ═══════════════════════════════ UNIFIED DROP ZONE ═══════════════════════
function UnifiedDropZone({onFiles,files,loading}){
  const[drag,setDrag]=useState(false);
  const inputRef=useRef();

  const handleDrop=e=>{
    e.preventDefault();setDrag(false);
    const f=e.dataTransfer.files;
    if(f.length)onFiles(f);
  };

  const hasN=!!files.n, hasN1=!!files.n1;
  const bothLoaded=hasN&&hasN1;
  const oneLoaded=hasN&&!hasN1;

  return(
    <label
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={handleDrop}
      style={{
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        width:'min(560px,90vw)',minHeight:220,
        border:`2px dashed ${drag?C.goldL:bothLoaded?C.green:hasN?C.blue:C.borderL}`,
        borderRadius:24,cursor:'pointer',
        background:drag?`${C.gold}08`:C.card,
        textAlign:'center',padding:32,
        transition:'all .22s',
        position:'relative',
      }}>
      <input ref={inputRef} type="file" accept=".txt,.csv,.tsv,.fec" multiple style={{display:'none'}}
        onChange={e=>{if(e.target.files.length)onFiles(e.target.files);e.target.value='';}}/>

      {loading?(
        <>
          <div style={{fontSize:36,marginBottom:12}}>⏳</div>
          <div style={{fontSize:15,color:C.sub,fontWeight:500}}>Analyse en cours…</div>
        </>
      ):!hasN?(
        <>
          <div style={{fontSize:48,marginBottom:14,filter:'drop-shadow(0 4px 12px rgba(200,145,58,.3))'}}>📂</div>
          <div style={{fontSize:17,fontWeight:700,color:C.text,marginBottom:8}}>Déposez vos fichiers FEC ici</div>
          <div style={{fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:16}}>
            Glisser-déposer <strong style={{color:C.text}}>1 ou 2 fichiers</strong> simultanément<br/>
            ou cliquer pour sélectionner
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginBottom:8}}>
            {['Exercice N','Exercice N-1 (optionnel)'].map((l,i)=>(
              <span key={i} style={{fontSize:11,color:C.muted,background:C.surf,padding:'3px 12px',borderRadius:20,border:`1px solid ${C.border}`}}>{l}</span>
            ))}
          </div>
          <div style={{fontSize:11,color:C.muted}}>Formats : .txt · .csv · .fec · séparateur | ou tabulation</div>
        </>
      ):(
        <>
          <div style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
            {/* Fichier N */}
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:12,background:`${C.green}0E`,border:`1px solid ${C.green}30`}}>
              <span style={{fontSize:20}}>✅</span>
              <div style={{flex:1,textAlign:'left'}}>
                <div style={{fontSize:11,color:C.green,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8}}>Exercice N</div>
                <div style={{fontSize:13,color:C.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{files.n}</div>
              </div>
            </div>
            {/* Fichier N-1 */}
            {hasN1?(
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:12,background:`${C.blue}0E`,border:`1px solid ${C.blue}30`}}>
                <span style={{fontSize:20}}>✅</span>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{fontSize:11,color:C.blueL,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8}}>Exercice N-1</div>
                  <div style={{fontSize:13,color:C.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{files.n1}</div>
                </div>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:12,background:C.surf,border:`1px dashed ${C.borderL}`}}>
                <span style={{fontSize:18,opacity:0.4}}>📁</span>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600}}>Exercice N-1</div>
                  <div style={{fontSize:12,color:C.muted}}>Ajouter un 2ᵉ fichier pour la comparaison (optionnel)</div>
                </div>
              </div>
            )}
          </div>
          <div style={{marginTop:14,fontSize:12,color:C.muted}}>
            Cliquer ou glisser pour {bothLoaded?'remplacer':'ajouter le N-1'}
          </div>
        </>
      )}
    </label>
  );
}

// ═══════════════════════════════ UPLOAD ══════════════════════════════════
function UploadZone({label,onFile,fileName,optional,accent}){
  const[drag,setDrag]=useState(false);
  const col=accent||C.gold;
  return(
    <label style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,width:300,height:200,border:`2px dashed ${drag?col:C.borderL}`,borderRadius:20,cursor:'pointer',background:drag?`${col}0A`:C.card,textAlign:'center',padding:24,transition:'all .22s'}}>
      <input type="file" accept=".txt,.csv,.tsv,.fec" style={{display:'none'}} onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);}}/>
      {fileName?(
        <><div style={{fontSize:38}}>✅</div><div style={{fontSize:13,color:C.green,fontWeight:600,wordBreak:'break-all',maxWidth:220}}>{fileName}</div><div style={{fontSize:11,color:C.sub}}>Chargé — cliquer pour remplacer</div></>
      ):(
        <><div style={{fontSize:40}}>{accent?'📁':'📂'}</div><div style={{fontSize:14,fontWeight:600,color:C.text}}>{label}</div><div style={{fontSize:12,color:C.sub}}>Glisser-déposer ou cliquer{optional&&<><br/><span style={{color:C.muted,fontSize:11}}>(optionnel)</span></>}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>.txt · .csv · sep. | ou tab</div></>
      )}

  );
}

// ═══════════════════════════════ TRÉSO JOURNALIÈRE ════════════════════════
function TresoPanel({dn,dn1,yearN}){
  const serie =dn?.tresoJournaliere||[];
  const serie1=dn1?.tresoJournaliere||[];
  const[zoom,setZoom]=useState('year');

  const ZOOMS=[{k:'year',l:'Année'},{k:'Q1',l:'T1'},{k:'Q2',l:'T2'},{k:'Q3',l:'T3'},{k:'Q4',l:'T4'},{k:'6m',l:'S2'},{k:'3m',l:'3m'}];
  const mRanges={Q1:['01','03'],Q2:['04','06'],Q3:['07','09'],Q4:['10','12'],'6m':['07','12'],'3m':['10','12']};

  const filter=useCallback((s)=>{
    if(zoom==='year'||!s.length) return s;
    const[from,to]=mRanges[zoom];
    return s.filter(d=>d.date.substring(4,6)>=from&&d.date.substring(4,6)<=to);
  },[zoom]);

  const filtered =useMemo(()=>filter(serie), [serie,zoom]);
  const filtered1=useMemo(()=>filter(serie1),[serie1,zoom]);

  if(!serie.length) return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:40,textAlign:'center',color:C.sub,fontSize:14}}>
      Aucun mouvement de trésorerie (comptes 51x/52x) détecté dans ce FEC.
    </div>
  );

  const soldeMin=Math.min(...filtered.map(d=>d.solde));
  const soldeMax=Math.max(...filtered.map(d=>d.solde));
  const soldeFin=filtered[filtered.length-1]?.solde||0;
  const tresoMoy=filtered.length>0?Math.round(filtered.reduce((a,d)=>a+d.solde,0)/filtered.length):0;
  const totalEntrees=filtered.reduce((a,d)=>a+d.entrees,0);
  const totalSorties=filtered.reduce((a,d)=>a+d.sorties,0);
  const dangerDays=filtered.filter(d=>d.solde<0).length;
  const lineColor=soldeFin>=0?'#34D399':'#F87171';

  const tickFormatter=(val)=>{
    if(!val)return'';
    const m=val.substring(4,6),d_=val.substring(6,8);
    if(zoom==='year')return d_==='01'?MOIS[parseInt(m)-1]:'';
    return d_==='01'||d_==='15'?`${d_}/${m}`:'';
  };

  const CustomTooltip=({active,payload})=>{
    if(!active||!payload?.[0])return null;
    const d=payload[0].payload;
    return(
      <div style={{background:'#111827',border:'1px solid #374151',borderRadius:10,padding:'12px 16px',minWidth:220,boxShadow:'0 8px 24px rgba(0,0,0,.7)'}}>
        <div style={{fontSize:11,color:'#9CA3AF',fontWeight:600,marginBottom:8,paddingBottom:6,borderBottom:'1px solid #1F2937'}}>{d.dateF}</div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
          <span style={{fontSize:12,color:'#9CA3AF'}}>Solde</span>
          <span style={{fontSize:13,fontWeight:700,fontFamily:"'DM Mono'",color:d.solde>=0?'#34D399':'#F87171'}}>{fmt(d.solde)}</span>
        </div>
        {d.entrees>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
          <span style={{fontSize:11,color:'#9CA3AF'}}>↑ Entrées</span>
          <span style={{fontSize:12,fontFamily:"'DM Mono'",color:'#34D399'}}>+{fmt(d.entrees)}</span>
        </div>}
        {d.sorties>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
          <span style={{fontSize:11,color:'#9CA3AF'}}>↓ Sorties</span>
          <span style={{fontSize:12,fontFamily:"'DM Mono'",color:'#F87171'}}>-{fmt(d.sorties)}</span>
        </div>}
        {d.details?.length>0&&(
          <div style={{marginTop:8,paddingTop:6,borderTop:'1px solid #1F2937'}}>
            {d.details.slice(0,3).map((dt,i)=>(
              <div key={i} style={{fontSize:10,color:'#6B7280',marginBottom:2,display:'flex',justifyContent:'space-between',gap:8}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{dt.lib}</span>
                <span style={{color:dt.montant>0?'#34D399':'#F87171',fontFamily:"'DM Mono'",flexShrink:0}}>{dt.montant>0?'+':''}{fmt(dt.montant,true)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* KPIs — 6 cartes avec tréso moyenne */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10}}>
        {[
          {l:'Solde fin période',    v:soldeFin,     col:soldeFin>=0?'#34D399':'#F87171', em:'💳'},
          {l:'Tréso. moyenne',       v:tresoMoy,     col:tresoMoy>=0?'#60A5FA':'#F87171', em:'∅'},
          {l:'Solde minimum',        v:soldeMin,     col:soldeMin>=0?'#34D399':'#F87171', em:'📉'},
          {l:'Solde maximum',        v:soldeMax,     col:'#60A5FA',                        em:'📈'},
          {l:'Total encaissements',  v:totalEntrees, col:'#34D399',                        em:'↑'},
          {l:'Total décaissements',  v:totalSorties, col:'#F87171',                        em:'↓'},
        ].map((k,i)=>(
          <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:'12px 14px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,background:`radial-gradient(circle at 80% 20%,${k.col}18,transparent 65%)`,pointerEvents:'none'}}/>
            <div style={{fontSize:9,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8,marginBottom:6,lineHeight:1.3}}>{k.l}</div>
            <div style={{fontSize:16,fontWeight:700,fontFamily:"'DM Mono'",color:k.col,letterSpacing:'-0.5px'}}>{fmt(k.v,true)}</div>
            <div style={{position:'absolute',top:9,right:9,fontSize:14,opacity:0.22}}>{k.em}</div>
          </div>
        ))}
      </div>

      {/* Graphique — LineChart garantit la visibilité de la courbe */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>Solde de trésorerie — {yearN}</div>
            <div style={{fontSize:11,color:C.sub,marginTop:2}}>
              {filtered.length} jours · amplitude {fmt(soldeMin,true)} → {fmt(soldeMax,true)}
              {dangerDays>0&&<span style={{color:'#F87171',fontWeight:600}}> · {dangerDays}j en négatif</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:3,background:C.surf,padding:3,borderRadius:9,border:`1px solid ${C.border}`}}>
            {ZOOMS.map(z=>(
              <button key={z.k} onClick={()=>setZoom(z.k)} style={{background:zoom===z.k?C.borderL:'transparent',border:'none',borderRadius:6,padding:'5px 12px',color:zoom===z.k?C.text:C.sub,fontSize:12,fontWeight:zoom===z.k?600:400,cursor:'pointer',transition:'all .15s'}}>{z.l}</button>
            ))}
          </div>
        </div>

        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={filtered} margin={{top:8,right:12,left:8,bottom:0}}>
            <defs>
              <linearGradient id="gTresoFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor={lineColor} stopOpacity={0.18}/>
                <stop offset="95%" stopColor={lineColor} stopOpacity={0.02}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="2 6" stroke={C.border} vertical={false}/>
            <XAxis dataKey="date" stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:11,fontFamily:"'DM Mono'"}}
              axisLine={false} tickLine={false} tickFormatter={tickFormatter} interval={0}/>
            <YAxis stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:10}} axisLine={false} tickLine={false}
              tickFormatter={v=>v>=1000?Math.round(v/1000)+'k€':v+'€'} width={62}/>
            <Tooltip content={<CustomTooltip/>}/>
            <ReferenceLine y={0} stroke="#F87171" strokeDasharray="4 3" strokeOpacity={0.6} strokeWidth={1.5}/>
            <ReferenceLine y={tresoMoy} stroke="#60A5FA" strokeDasharray="3 5" strokeOpacity={0.5} strokeWidth={1}/>
            {/* Remplissage zone */}
            <Area type="monotone" dataKey="solde" stroke="none" fill="url(#gTresoFill)" dot={false}/>
            {/* Courbe principale bien visible */}
            <Line type="monotone" dataKey="solde" stroke={lineColor} strokeWidth={2.5} dot={false}
              activeDot={{r:5,fill:lineColor,stroke:'#060810',strokeWidth:2}}/>
            {/* N-1 en pointillés si disponible */}
            {dn1&&filtered1.length>0&&(
              <Line type="monotone" data={filtered1} dataKey="solde"
                stroke="#6B7280" strokeWidth={1.5} strokeDasharray="4 3" dot={false} opacity={0.7}/>
            )}
          </ComposedChart>
        </ResponsiveContainer>

        <div style={{marginTop:12,display:'flex',gap:20,fontSize:11,color:C.sub}}>
          <span style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:24,height:2.5,background:lineColor,display:'inline-block',borderRadius:2}}/>
            Solde {yearN}
          </span>
          <span style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:24,height:2,background:'#60A5FA',display:'inline-block',borderRadius:2,opacity:0.6}}/>
            Moyenne ({fmt(tresoMoy,true)})
          </span>
          {dn1&&<span style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:24,height:2,background:'#6B7280',display:'inline-block',borderRadius:2,opacity:0.6}}/>
            {yearN-1}
          </span>}
        </div>
      </div>

      {/* Top 10 mouvements avec libellés */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'#34D399',textTransform:'uppercase',letterSpacing:0.8,marginBottom:12}}>↑ Top 10 encaissements</div>
          {[...filtered].sort((a,b)=>b.entrees-a.entrees).slice(0,10).map((d,i)=>{
            const topLib=d.details?.filter(x=>x.montant>0).sort((a,b)=>b.montant-a.montant)[0]?.lib||'';
            return(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderRadius:7,marginBottom:3,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.12)'}}>
                <div style={{display:'flex',flexDirection:'column',gap:1,minWidth:0,flex:1,marginRight:8}}>
                  <span style={{fontSize:11,color:C.sub,fontFamily:"'DM Mono'",flexShrink:0}}>{d.dateF}</span>
                  {topLib&&<span style={{fontSize:10,color:'#6B7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{topLib}</span>}
                </div>
                <span style={{fontSize:12,fontWeight:600,color:'#34D399',fontFamily:"'DM Mono'",flexShrink:0}}>+{fmt(d.entrees,true)}</span>
              </div>
            );
          })}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'#F87171',textTransform:'uppercase',letterSpacing:0.8,marginBottom:12}}>↓ Top 10 décaissements</div>
          {[...filtered].sort((a,b)=>b.sorties-a.sorties).slice(0,10).map((d,i)=>{
            const topLib=d.details?.filter(x=>x.montant<0).sort((a,b)=>a.montant-b.montant)[0]?.lib||'';
            return(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderRadius:7,marginBottom:3,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.12)'}}>
                <div style={{display:'flex',flexDirection:'column',gap:1,minWidth:0,flex:1,marginRight:8}}>
                  <span style={{fontSize:11,color:C.sub,fontFamily:"'DM Mono'",flexShrink:0}}>{d.dateF}</span>
                  {topLib&&<span style={{fontSize:10,color:'#6B7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{topLib}</span>}
                </div>
                <span style={{fontSize:12,fontWeight:600,color:'#F87171',fontFamily:"'DM Mono'",flexShrink:0}}>{fmt(d.sorties,true)}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[files,setFiles]=useState({n:null,n1:null});
  const[entries,setEntries]=useState({n:null,n1:null});
  const[data,setData]=useState({n:null,n1:null});
  const[yearN,setYearN]=useState(new Date().getFullYear());
  const[company,setCompany]=useState('');
  const[tab,setTab]=useState('sig');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[drill,setDrill]=useState(null);

  const processText=(text,key)=>{
    try{
      const ents=parseFEC(text);
      if(!ents.length){setError('Fichier non reconnu. Vérifiez le format FEC.');return;}
      const sig=computeSIG(ents);
      if(sig.year&&key==='n')setYearN(sig.year);
      setEntries(prev=>({...prev,[key]:ents}));
      setData(prev=>({...prev,[key]:sig}));
      setError('');
    }catch(e){setError('Erreur: '+e.message);}
  };

  // Lecture d'un fichier et attribution automatique N / N-1
  const readFileText=(file)=>new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.onerror=()=>reject(new Error('Lecture impossible'));
    r.readAsText(file,'UTF-8');
  });

  const handleFiles=useCallback(async(fileList)=>{
    const fArray=Array.from(fileList).filter(f=>f.size>0).slice(0,2);
    if(!fArray.length)return;
    setLoading(true);setError('');
    try{
      // Lire tous les fichiers
      const parsed=await Promise.all(fArray.map(async f=>{
        const text=await readFileText(f);
        const ents=parseFEC(text);
        if(!ents.length)throw new Error(`Fichier "${f.name}" non reconnu. Vérifiez le format FEC.`);
        const sig=computeSIG(ents);
        return{name:f.name,ents,sig,year:sig.year||new Date().getFullYear()};
      }));

      // Tri : le plus récent = N, le plus ancien = N-1
      parsed.sort((a,b)=>b.year-a.year);
      const[pN,pN1]=parsed;

      setYearN(pN.year);
      setEntries({n:pN.ents,n1:pN1?pN1.ents:null});
      setData({n:pN.sig,n1:pN1?pN1.sig:null});
      setFiles({n:pN.name,n1:pN1?pN1.name:null});
    }catch(e){
      setError(e.message);
    }finally{
      setLoading(false);
    }
  },[]);

  // Compat : handleFile utilisé par le bouton "+N-1" dans le dashboard
  const handleFile=useCallback((file,key)=>{
    setLoading(true);
    const r=new FileReader();
    r.onload=e=>{processText(e.target.result,key);setLoading(false);};
    r.onerror=()=>{setError('Impossible de lire.');setLoading(false);};
    r.readAsText(file,'UTF-8');
  },[]);

  const loadDemo=()=>{
    setCompany('SARL SERVICES MÉDITERRANÉE (DÉMO)');
    processText(DEMO_N,'n');
    processText(DEMO_N1,'n1');
    setFiles({n:'demo_2024.fec',n1:'demo_2023.fec'});
    setYearN(2024);
  };

  const dn=data.n,dn1=data.n1;
  const TABS=[{k:'sig',l:'Soldes Intermédiaires de Gestion'},{k:'mensuel',l:'Analyses mensuelles'},{k:'treso',l:'💳 Trésorerie'},{k:'charges',l:'Structure charges'},{k:'bilan',l:'Bilan simplifié'}];

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* ── HEADER */}
      <div style={{background:C.surf,borderBottom:`1px solid ${C.border}`,padding:'14px 36px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:150}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:38,height:38,background:`linear-gradient(135deg, ${C.gold} 0%, ${C.goldL} 100%)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Serif Display'",fontSize:21,color:'#fff',boxShadow:`0 4px 16px ${C.gold}50`}}>A</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,letterSpacing:'-0.3px'}}>Financiel Vision</div>
            <div style={{fontSize:11,color:C.sub}}>Outil d'analyse financière · créé par Romain Froment</div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          {!dn&&<button onClick={loadDemo} style={{background:`linear-gradient(135deg,${C.gold},${C.goldL})`,border:'none',borderRadius:9,padding:'8px 18px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:`0 4px 14px ${C.gold}40`}}>🎭 Charger la démo</button>}
          {dn&&<>
            <input value={company} onChange={e=>setCompany(e.target.value)} placeholder="Raison sociale…" style={{background:C.card,border:`1px solid ${C.borderL}`,borderRadius:8,padding:'7px 14px',color:C.text,fontSize:13,width:220}}/>
            <input type="number" value={yearN} onChange={e=>setYearN(Number(e.target.value))} style={{background:C.card,border:`1px solid ${C.borderL}`,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:13,width:78}}/>
            {!dn1&&<label className="btn-ghost" style={{display:'inline-flex',alignItems:'center',gap:6,cursor:'pointer'}}>＋ N-1<input type="file" accept=".txt,.csv,.tsv,.fec" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){setFiles(p=>({...p,n1:f.name}));handleFile(f,'n1');}}}/></label>}
            <button className="btn-ghost" onClick={()=>{setData({n:null,n1:null});setEntries({n:null,n1:null});setFiles({n:null,n1:null});setDrill(null);}}>↩ Reset</button>
          </>}
        </div>
      </div>

      {/* ── UPLOAD */}
      {!dn&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 71px)',gap:40}}>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:"'DM Serif Display'",fontSize:38,color:C.text,marginBottom:10}}>Analyse financière FEC</div>
            <div style={{fontSize:15,color:C.sub,maxWidth:520,lineHeight:1.6}}>Déposez 1 ou 2 fichiers FEC pour obtenir vos SIG, analyses mensuelles et drill-down jusqu'aux écritures.</div>
          </div>

          {/* Zone de dépôt unique */}
          <UnifiedDropZone onFiles={handleFiles} files={files} loading={loading}/>

          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
            <div style={{color:C.muted,fontSize:13,display:'flex',alignItems:'center',gap:10}}>
              <div style={{height:1,width:80,background:C.border}}/> ou <div style={{height:1,width:80,background:C.border}}/>
            </div>
            <button onClick={loadDemo} style={{background:`linear-gradient(135deg,${C.gold},${C.goldL})`,border:'none',borderRadius:12,padding:'13px 32px',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:`0 6px 24px ${C.gold}45`,letterSpacing:'-0.2px'}}>🎭 Charger les données de démonstration</button>
            <div style={{fontSize:12,color:C.muted}}>SARL SERVICES MÉDITERRANÉE · 2023 &amp; 2024 · ~480k€ CA</div>
          </div>

          {error&&<div style={{color:C.red,fontSize:13,background:`${C.red}18`,padding:'10px 20px',borderRadius:8,maxWidth:480,textAlign:'center'}}>{error}</div>}
          <div style={{fontSize:11,color:C.muted}}>🔒 100% local — aucune donnée transmise au serveur</div>
        </div>
      )}

      {/* ── DASHBOARD */}
      {dn&&(
        <div style={{padding:'24px 36px 40px',maxWidth:1380,margin:'0 auto'}}>
          {/* Title */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}} className="fu">
            <div>
              <div style={{fontFamily:"'DM Serif Display'",fontSize:24,color:C.text}}>{company||'Analyse financière'}</div>
              <div style={{fontSize:12,color:C.sub,marginTop:3}}>Exercice {yearN}{dn1?` vs ${yearN-1}`:''} · {files.n}{dn1&&` · ${files.n1}`}</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>{loadDemo();}} className="btn-ghost">🎭 Recharger démo</button>
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
            <KPICard label="Chiffre d'affaires" value={dn.ca} prev={dn1?.ca} color={C.blue} emoji="📈" delay={0}/>
            <KPICard label="EBE" value={dn.ebe} prev={dn1?.ebe} color={C.gold} emoji="⚙️" refCA={dn.ca} delay={60}/>
            <KPICard label="Résultat Net" value={dn.rnet} prev={dn1?.rnet} color={dn.rnet>=0?C.green:C.red} emoji="🏆" refCA={dn.ca} delay={120}/>
            <KPICard label="Trésorerie" value={dn.treso} prev={dn1?.tresoActif} color={C.purple} emoji="💰" delay={180}/>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',gap:2,marginBottom:16,background:C.surf,padding:4,borderRadius:11,width:'fit-content',border:`1px solid ${C.border}`}}>
            {TABS.map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)} style={{background:tab===t.k?C.borderL:'transparent',border:'none',borderRadius:8,padding:'8px 20px',color:tab===t.k?C.text:C.sub,fontSize:13,fontWeight:tab===t.k?600:400,cursor:'pointer',transition:'all .18s'}}>
                {t.l}
              </button>
            ))}
          </div>

          {/* Tab content */}
          <div key={tab} className="fu">
            {tab==='sig'     && <SIGTable dn={dn} dn1={dn1} yearN={yearN} entries={entries.n} onDrill={row=>{setDrill(row);}}/>}
            {tab==='mensuel' && <MensuelAnalyse dn={dn} dn1={dn1} yearN={yearN}/>}
            {tab==='treso'   && <TresoPanel dn={dn} dn1={dn1} yearN={yearN}/>}
            {tab==='charges' && <ChargesPanel dn={dn} dn1={dn1} yearN={yearN}/>}
            {tab==='bilan'   && <BilanPanel dn={dn} dn1={dn1} yearN={yearN} entries={entries.n}/>}
          </div>

          <div style={{marginTop:24,fontSize:11,color:C.muted,textAlign:'center'}}>
            Financiel Vision · Traitement 100% local, données confidentielles
          </div>
        </div>
      )}

      {/* ── DRILL PANEL */}
      {drill&&(
        <>
          <div onClick={()=>setDrill(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:199,backdropFilter:'blur(2px)'}}/>
          <DrillPanel entries={entries.n} sigRow={drill} dn={dn} onClose={()=>setDrill(null)}/>
        </>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
