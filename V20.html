// ═══════════════════════════════ DEMO DATA ═════════════════════════════════
function generateDemoFEC(year,caBase,seed=1){
  const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  const lines=[];
  let eNum=1;
  const push=(compte,lib,date,ecLib,debit,credit)=>{
    lines.push(`${compte}\t${lib}\t${year}${date}\t${ecLib}\t${debit>0?debit.toFixed(2):'0.00'}\t${credit>0?credit.toFixed(2):'0.00'}`);
    eNum++;
  };
  // CA distribution mensuelle (seasonalité services)
  const caSeasons=[0.055,0.065,0.08,0.085,0.09,0.10,0.085,0.075,0.08,0.095,0.09,0.10];
  const months=[
    {m:'01',d:'31'},{m:'02',d:'28'},{m:'03',d:'31'},{m:'04',d:'30'},
    {m:'05',d:'31'},{m:'06',d:'30'},{m:'07',d:'31'},{m:'08',d:'31'},
    {m:'09',d:'30'},{m:'10',d:'31'},{m:'11',d:'30'},{m:'12',d:'31'}
  ];

  months.forEach(({m,d},i)=>{
    const ca=Math.round(caBase*caSeasons[i]);
    const v=rng(seed*100+i);
    // ── Ventes de services (706 + 411 HT uniquement, pas de TVA pour simplifier)
    const nbFact=Math.max(2,Math.round(3+v*4));
    const parts=[];
    let remain=ca;
    for(let f=0;f<nbFact-1;f++){
      const p=Math.round(remain/(nbFact-f)*(0.7+rng(seed*200+i*10+f)*0.6));
      parts.push(Math.max(1000,p));
      remain-=parts[parts.length-1];
    }
    parts.push(Math.max(500,remain));
    parts.forEach((p,f)=>{
      const clientIdx=Math.floor(rng(seed*300+i*20+f)*8)+1;
      const ref=`FACT-${year}${m}-${String(f+1).padStart(2,'0')}`;
      push('706010','Prestations de services',`${m}${d}`,ref,0,p);
      push('411010','Clients',`${m}${d}`,ref,p,0);
    });
    // ── Encaissements clients (répartis sur plusieurs jours)
    const enc=Math.round(ca*(0.85+rng(seed*800+i)*0.2));
    const encDays=[5,8,12,16,22,26].slice(0,3+Math.floor(rng(seed*810+i)*3));
    let remEnc=enc;
    encDays.forEach((day,fi)=>{
      const part=fi<encDays.length-1?Math.round(remEnc/(encDays.length-fi)*(0.6+rng(seed*820+i*10+fi)*0.8)):remEnc;
      if(part>0){
        const dd=String(Math.min(day,parseInt(d))).padStart(2,'0');
        const ref=`ENC CLI${String(fi+1).padStart(2,'0')}`;
        push('512010','Banque CIC',m+dd,ref,part,0);
        push('411010','Clients',m+dd,ref,0,part);
        remEnc-=part;
      }
    });
    // ── Achats consommables (606)
    const ach=Math.round(caBase*0.04/12*(0.8+rng(seed*400+i)*0.4));
    if(ach>0){
      push('606010','Achats non stockés',`${m}10`,'FOURNITURES',ach,0);
      push('401010','Fournisseurs divers',`${m}10`,'FOURNITURES',0,ach);
      // Règlement fournisseur
      push('401010','Fournisseurs divers',`${m}22`,'REGLT FOURNISSEURS',ach,0);
      push('512010','Banque CIC',`${m}22`,'REGLT FOURNISSEURS',0,ach);
    }
    // ── Loyer (613) — facturation + règlement séparés
    push('613010','Loyers',`${m}01`,'LOYER BUREAUX',3000,0);
    push('401020','Bailleur SCI',`${m}01`,'LOYER BUREAUX',0,3000);
    push('401020','Bailleur SCI',`${m}05`,'VIRT LOYER',3000,0);
    push('512010','Banque CIC',`${m}05`,'VIRT LOYER',0,3000);
    // ── Assurances (616) — trimestriel
    if(i%3===0){
      push('616010','Primes assurances',`${m}10`,'AXA RC PRO TRIM.',1200,0);
      push('401030','AXA ASSURANCES',`${m}10`,'AXA RC PRO TRIM.',0,1200);
      push('401030','AXA ASSURANCES',`${m}12`,'PRELEVEMENT AXA',1200,0);
      push('512010','Banque CIC',`${m}12`,'PRELEVEMENT AXA',0,1200);
    }
    // ── Honoraires (622) — mensuel pair
    if(i%2===0){
      const hon=Math.round(800+rng(seed*500+i)*400);
      push('622010','Honoraires',`${m}15`,'EXPERTISE',hon,0);
      push('401040','CABINET EXPERT',`${m}15`,'EXPERTISE',0,hon);
      push('401040','CABINET EXPERT',`${m}20`,'REGLT EXPERT',hon,0);
      push('512010','Banque CIC',`${m}20`,'REGLT EXPERT',0,hon);
    }
    // ── Frais télécoms (626)
    push('626010','Télécoms',`${m}05`,'ABONNEMENTS TELCO',320,0);
    push('401060','ORANGE PRO',`${m}05`,'ABONNEMENTS TELCO',0,320);
    push('401060','ORANGE PRO',`${m}08`,'PRELEVEMENT ORANGE',320,0);
    push('512010','Banque CIC',`${m}08`,'PRELEVEMENT ORANGE',0,320);
    // ── Logiciels/SI (627)
    push('627010','Services SI',`${m}15`,'LOGICIELS',580,0);
    push('401070','INFORMATIQUE',`${m}15`,'LOGICIELS',0,580);
    push('401070','INFORMATIQUE',`${m}18`,'REGLT LOGICIELS',580,0);
    push('512010','Banque CIC',`${m}18`,'REGLT LOGICIELS',0,580);
    // ── Déplacements (625) — CB directe banque
    const dep=Math.round(300+rng(seed*600+i)*400);
    push('625010','Déplacements',`${m}07`,'CB FRAIS',Math.round(dep*0.5),0);
    push('512010','Banque CIC',`${m}07`,'CB FRAIS',0,Math.round(dep*0.5));
    push('625010','Déplacements',`${m}18`,'CB FRAIS',dep-Math.round(dep*0.5),0);
    push('512010','Banque CIC',`${m}18`,'CB FRAIS',0,dep-Math.round(dep*0.5));
    // ── Personnel (641) — salaire → banque le 25
    const salBrut=Math.round(caBase*0.34/12);
    push('641010','Salaires bruts',`${m}${d}`,'PAIE',salBrut,0);
    push('421010','Personnel dû',`${m}${d}`,'PAIE',0,salBrut);
    push('421010','Personnel dû',`${m}25`,'VIRT SALAIRES',salBrut,0);
    push('512010','Banque CIC',`${m}25`,'VIRT SALAIRES',0,salBrut);
    // ── Charges sociales (645) — patronales
    const cs=Math.round(salBrut*0.45);
    push('645010','Cot. soc. patronales',`${m}${d}`,'URSSAF',cs,0);
    push('431010','URSSAF',`${m}${d}`,'URSSAF',0,cs);
    push('431010','URSSAF',`${m}${d}`,'URSSAF PRELEVEMENT',cs,0);
    push('512010','Banque CIC',`${m}${d}`,'URSSAF PRELEVEMENT',0,cs);
    // ── Impôts & taxes (635) — trimestriel
    if(i%3===0){
      push('635010','Impôts & taxes',`${m}10`,'CFE/TVS',Math.round(2400/4),0);
      push('447010','État impôts',`${m}10`,'CFE/TVS',0,Math.round(2400/4));
      push('447010','État impôts',`${m}15`,'REGLT CFE',Math.round(2400/4),0);
      push('512010','Banque CIC',`${m}15`,'REGLT CFE',0,Math.round(2400/4));
    }
    // ── Dotations amortissements (681) — OD mensuelle
    push('681110','Dot. amort.',`${m}${d}`,'AMORT MENSUEL',2000,0);
    push('281820','Amort. matériel',`${m}${d}`,'AMORT MENSUEL',0,2000);
    // ── Intérêts emprunt (661) — prélèvement automatique
    const interets=Math.round(620+rng(seed*700+i)*80);
    push('661100','Intérêts emprunt',`${m}03`,'ECHEANCE CREDIT',interets,0);
    push('512010','Banque CIC',`${m}03`,'ECHEANCE CREDIT',0,interets);
  });

  // ── Bilan d'ouverture équilibré ──────────────────────────────────────────
  // ACTIF OUVERTURE
  push('215010','Matériel informatique','0101','BILAN OUVERTURE',45000,0);
  push('218010','Autres immo. corporelles','0101','BILAN OUVERTURE',28000,0);
  // Amortissements cumulés au 01/01 (comptes 28x = créditeurs)
  push('281820','Amort. cumulé matériel','0101','BILAN OUVERTURE',0,18000);
  // Créances clients ouverture
  push('411010','Clients','0101','BILAN OUVERTURE',35000,0);
  // Banque solde ouverture (calculé pour équilibrer)
  // Actif : 45000+28000-18000+35000 + banque = Passif : 50000+120000+78000
  // banque = 248000 - 90000 = 158000
  push('512010','Banque CIC','0101','BILAN OUVERTURE',158000,0);
  // PASSIF OUVERTURE
  push('101000','Capital social','0101','BILAN OUVERTURE',0,50000);
  push('110000','Réserves légales','0101','BILAN OUVERTURE',0,20000);
  push('112000','Réserves libres','0101','BILAN OUVERTURE',0,100000);
  push('164010','Emprunt bancaire LT','0101','BILAN OUVERTURE',0,78000);
  // IS (acomptes en juin + solde en dec)
  const rnetEst=Math.round((caBase*0.90-caBase*0.04-36000-caBase*0.08-caBase*0.06-caBase*0.34*1.45-2400-24000-7500)*0.25);
  push('695100','IS - acomptes','0630','ACOMPTE IS',Math.round(rnetEst*0.5),0);push('512010','Banque CIC','0630','ACOMPTE IS',0,Math.round(rnetEst*0.5));
  push('695100','IS - solde','1231','SOLDE IS',Math.round(rnetEst*0.5),0);push('512010','Banque CIC','1231','SOLDE IS',0,Math.round(rnetEst*0.5));

  return 'CompteNum\tCompteLib\tEcritureDate\tEcritureLib\tDebit\tCredit\n'+lines.join('\n');
}

// ═══════════════════════════════ FEC PARSER ════════════════════════════════
function parseFEC(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const sample=lines[0];
  const sep=sample.split('|').length>5?'|':sample.split('\t').length>5?'\t':';';
  const hdr=sample.split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const idx=names=>{for(const n of names){const i=hdr.findIndex(h=>h===n||h.startsWith(n));if(i>=0)return i;}return-1;};
  const iC=idx(['comptenum','compte_num','numcompte']);
  const iL=idx(['comptelib','compte_lib','libcompte']);
  const iD=idx(['debit','montantdebit']);
  const iCr=idx(['credit','montantcredit']);
  const iDt=idx(['ecrituredate','date_ecriture','datepiece','piecedate']);
  const iEl=idx(['ecriturelib','libelle','ecriture_lib','piecelib']);
  if(iC<0||iD<0||iCr<0)return[];
  const tf=s=>parseFloat((s||'0').replace(',','.').replace(/\s/g,''))||0;
  return lines.slice(1).map(line=>{
    const v=line.split(sep).map(x=>x.trim().replace(/^"|"$/g,''));
    return{compte:(v[iC]||'').replace(/\s/g,''),lib:v[iL]||'',debit:tf(v[iD]),credit:tf(v[iCr]),date:v[iDt]||'',ecLib:v[iEl]||''};
  }).filter(r=>r.compte&&/^\d/.test(r.compte));
}

// ═══════════════════════════════ SIG CONFIG ════════════════════════════════
// Each row: {id, label, prefixes, sign (debit=charge, credit=produit), bold, accent, sep, indent, big}
const SIG_ROWS=[
  {id:'ca',      label:"Chiffre d'affaires",         prefixes:['70'],       sign:'credit', bold:true,  sep:true},
  {id:'prodstk', label:"+ Prod. stockée / immob.",   prefixes:['71','72'],  sign:'credit', indent:true},
  {id:'subv',    label:"+ Subventions d'exploit.",   prefixes:['74'],       sign:'credit', indent:true},
  {id:'achats',  label:"— Achats consommés nets",    prefixes:['60','6037','6031','6032'], sign:'debit', indent:true},
  {id:'mb',      label:"Marge brute",                prefixes:[],           computed:true, bold:true, accent:true},
  {id:'sext',    label:"— Services extérieurs",      prefixes:['61','62'],  sign:'debit',  indent:true},
  {id:'va',      label:"Valeur Ajoutée",             prefixes:[],           computed:true, bold:true, sep:true},
  {id:'perso',   label:"— Charges de personnel",     prefixes:['64'],       sign:'debit',  indent:true},
  {id:'taxes',   label:"— Impôts & taxes d'exploit.",prefixes:['63'],       sign:'debit',  indent:true},
  {id:'ebe',     label:"EBE",                        prefixes:[],           computed:true, bold:true, accent:true, sep:true},
  {id:'dot',     label:"— Dotations amortissements", prefixes:['681','682'],sign:'debit',  indent:true},
  {id:'repr',    label:"+ Reprises",                 prefixes:['781','782'],sign:'credit', indent:true},
  {id:'autprod', label:"+ Autres produits gestion",  prefixes:['75'],       sign:'credit', indent:true},
  {id:'autch',   label:"— Autres charges gestion",   prefixes:['65'],       sign:'debit',  indent:true},
  {id:'rex',     label:"Résultat d'Exploitation",    prefixes:[],           computed:true, bold:true, accent:true, sep:true},
  {id:'pfinc',   label:"+ Produits financiers",      prefixes:['76'],       sign:'credit', indent:true},
  {id:'cfinc',   label:"— Charges financières",      prefixes:['66'],       sign:'debit',  indent:true},
  {id:'rfin',    label:"Résultat financier",         prefixes:[],           computed:true, bold:false, sep:false},
  {id:'rct',     label:"Résultat courant avant IS",  prefixes:[],           computed:true, bold:true},
  {id:'pexc',    label:"+ Produits exceptionnels",   prefixes:['77'],       sign:'credit', indent:true},
  {id:'cexc',    label:"— Charges exceptionnelles",  prefixes:['67'],       sign:'debit',  indent:true},
  {id:'rexc',    label:"Résultat exceptionnel",      prefixes:[],           computed:true},
  {id:'is',      label:"— IS & participation",       prefixes:['695','698','691'],sign:'debit',indent:true},
  {id:'rnet',    label:"RÉSULTAT NET",               prefixes:[],           computed:true, bold:true, accent:true, big:true, sep:true},
];

// ═══════════════════════════════ SIG COMPUTE ══════════════════════════════
// Flat SIG computation — NO recursion, NO monthly breakdown (safe to call on sub-sets)
function computeBaseSIG(entries){
  const NET=(pxs,mode)=>{
    let d=0,c=0;
    for(const e of entries){
      for(const px of pxs){
        if(e.compte.startsWith(px)){d+=e.debit;c+=e.credit;break;}
      }
    }
    return mode==='credit'?c-d:d-c;
  };
  const v={};
  for(const row of SIG_ROWS){
    if(!row.computed&&row.prefixes&&row.prefixes.length>0)
      v[row.id]=NET(row.prefixes,row.sign);
  }
  v.mb   = v.ca + (v.prodstk||0) - v.achats;
  v.va   = v.mb - v.sext;
  v.ebe  = v.va - v.perso - v.taxes + (v.subv||0);
  v.rex  = v.ebe - v.dot + (v.repr||0) + (v.autprod||0) - (v.autch||0);
  v.rfin = (v.pfinc||0) - (v.cfinc||0);
  v.rct  = v.rex + v.rfin;
  v.rexc = (v.pexc||0) - (v.cexc||0);
  v.rnet = v.rct + v.rexc - (v.is||0);
  return v;
}

// Full SIG — calls computeBaseSIG per month (never itself)
function computeSIG(entries){
  const v = computeBaseSIG(entries);

  // CA mensuel simple (pour graphique rapide)
  const mensuel={};
  for(const e of entries){
    if(e.compte.startsWith('70')&&e.date&&e.date.length>=6){
      const mk=e.date.substring(4,6);
      if(mk>='01'&&mk<='12')mensuel[mk]=(mensuel[mk]||0)+(e.credit-e.debit);
    }
  }

  // Groupement par mois puis SIG plat sur chaque mois (pas de récursion)
  const byMonth={};
  for(const e of entries){
    if(e.date&&e.date.length>=6){
      const mk=e.date.substring(4,6);
      if(mk>='01'&&mk<='12'){
        if(!byMonth[mk])byMonth[mk]=[];
        byMonth[mk].push(e);
      }
    }
  }
  const monthSIG={};
  for(const mk of Object.keys(byMonth)){
    monthSIG[mk]=computeBaseSIG(byMonth[mk]); // ← flat, pas de récursion
  }

  // ══════════════════════════════════════════════════════════════════════════
  // BILAN — CLASSIFICATION EXHAUSTIVE PCG (zéro compte non reconnu)
  // Chaque compte cl.1-5 passe dans _pcgClass → ligne précise.
  // Amortissements & dépréciations : même ligne que l'actif réduit, n<0.
  // Identité Actif = Passif garantie si ΣD = ΣC dans le FEC.
  // ══════════════════════════════════════════════════════════════════════════

  // 1. Solde net par compte (D - C)
  const _acctNet = {};
  for(const e of entries)
    _acctNet[e.compte] = (_acctNet[e.compte]||0) + e.debit - e.credit;

  // 2. Table PCG complète — retourne [side:'A'|'P', ligne:string]
  //    n = solde net D-C du compte ; positif = solde débiteur, négatif = créditeur
  const _pcgClass = (c, n) => {
    // ── CLASSE 1 ──────────────────────────────────────────────────────────
    if(/^10[1-5]/.test(c)||c.startsWith('10'))  return ['P','capital'];
    if(c.startsWith('106')||c.startsWith('107')||c.startsWith('1068')) return ['P','primesRes'];
    if(c.startsWith('108')) return ['P','capital'];
    if(c.startsWith('109')) return ['A','autresActif']; // capital non appelé
    if(c.startsWith('11'))  return ['P','reserves'];
    if(c.startsWith('12'))  return ['P','report'];  // report à nouveau (n>0 = perte reportée, valeur négative au passif)
    if(c.startsWith('13'))  return ['P','subvInv'];
    if(c.startsWith('14'))  return ['P','provRegl'];
    if(c.startsWith('15'))  return ['P','provisions'];
    if(c.startsWith('16')||c.startsWith('17')||c.startsWith('18'))
      return n<=0 ? ['P','detteFin'] : ['A','autresActif'];
    if(c.startsWith('19'))  return ['A','immoFin']; // dépréc. immo fin. (réducteur, n<0)

    // ── CLASSE 2 ──────────────────────────────────────────────────────────
    if(c.startsWith('20'))  return ['A','immoIncorp'];
    if(c.startsWith('21')||c.startsWith('22')||c.startsWith('23')||
       c.startsWith('24')||c.startsWith('25')) return ['A','immoCorp'];
    if(c.startsWith('26')||c.startsWith('27')) return ['A','immoFin'];
    // Amortissements incorporels (280x, 2808, 2809, 2801-2805)
    if(c.startsWith('280')) return ['A','immoIncorp'];
    // Amortissements corporels (281-285, 2818, 2819, etc.)
    if(c.startsWith('281')||c.startsWith('282')||c.startsWith('283')||
       c.startsWith('284')||c.startsWith('285')) return ['A','immoCorp'];
    // Amortissements immo. financières (286-288)
    if(c.startsWith('286')||c.startsWith('287')||c.startsWith('288')) return ['A','immoFin'];
    if(c.startsWith('28')) return ['A','immoCorp']; // autres 28x
    // Dépréciations incorporelles (290x)
    if(c.startsWith('290')) return ['A','immoIncorp'];
    // Dépréciations corporelles (291-295)
    if(c.startsWith('291')||c.startsWith('292')||c.startsWith('293')||
       c.startsWith('294')||c.startsWith('295')) return ['A','immoCorp'];
    // Dépréciations immo. financières (296-299)
    if(c.startsWith('296')||c.startsWith('297')||c.startsWith('298')||
       c.startsWith('299')) return ['A','immoFin'];
    if(c.startsWith('29')) return ['A','immoIncorp'];
    if(c.startsWith('2'))  return ['A','immoFin']; // 2x non classés

    // ── CLASSE 3 ──────────────────────────────────────────────────────────
    if(c.startsWith('39')) return ['A','stocks']; // dépréciations stocks (n<0)
    if(c[0]==='3')         return ['A','stocks'];

    // ── CLASSE 4 ──────────────────────────────────────────────────────────
    if(c.startsWith('409')) return ['A','creancesExp']; // fournisseurs débiteurs (acomptes)
    if(c.startsWith('40'))  return n>=0 ? ['A','creancesExp']  : ['P','detteFrs'];
    if(c.startsWith('419')) return ['P','clientsCred']; // clients créditeurs (avances reçues)
    if(c.startsWith('41'))  return n>=0 ? ['A','clients']       : ['P','clientsCred'];
    if(c.startsWith('42'))  return n>=0 ? ['A','creancesExp']   : ['P','detteSoc'];
    if(c.startsWith('43'))  return n>=0 ? ['A','creancesExp']   : ['P','detteSoc'];
    if(c.startsWith('44'))  return n>=0 ? ['A','creanceFisc']   : ['P','detteFisc'];
    if(c.startsWith('45'))  return n>=0 ? ['A','autresCre']     : ['P','autresDettes'];
    if(c.startsWith('46'))  return n>=0 ? ['A','autresCre']     : ['P','autresDettes'];
    if(c.startsWith('47'))  return n>=0 ? ['A','regulA']        : ['P','regulP'];
    if(c.startsWith('48'))  return n>=0 ? ['A','regulA']        : ['P','regulP'];
    if(c.startsWith('49'))  return ['A','clients']; // dépréciations créances (n<0)
    if(c.startsWith('4'))   return n>=0 ? ['A','autresCre']     : ['P','autresDettes'];

    // ── CLASSE 5 ──────────────────────────────────────────────────────────
    if(c.startsWith('59')) return ['A','treso']; // dépréciations VMP (n<0)
    if(c[0]==='5') return n>=0 ? ['A','treso'] : ['P','decouvert'];

    // ── FALLBACK (plan comptable adapté, comptes spéciaux) ────────────────
    return n>=0 ? ['A','autresActif'] : ['P','autresDettes'];
  };

  // 3. Boucle unique exhaustive — chaque compte cl.1-5 contribue exactement une fois
  const _BL = {}; // 'A_clients' → somme des nets signés
  for(const [c, n] of Object.entries(_acctNet)){
    if(c[0]<'1'||c[0]>'5') continue;
    const [side, ligne] = _pcgClass(c, n);
    _BL[side+'_'+ligne] = (_BL[side+'_'+ligne]||0) + n;
  }

  // 4. Résultat P&L = ∑(C-D) sur cl.6-7
  const plNet = Object.entries(_acctNet)
    .filter(([c])=>c[0]==='6'||c[0]==='7')
    .reduce((a,[,n])=>a-n, 0);

  // 5. Lecture des lignes
  //    Actif  : _BL['A_x'] est signé (négatif si amort > brut, rare)
  //    Passif : _BL['P_x'] est négatif (créditeurs) → on nège pour affichage
  const _A = l => _BL['A_'+l]||0;
  const _P = l => -(_BL['P_'+l]||0);

  // 6. Totaux et postes bilan
  const biImmoIncorp  = _A('immoIncorp');
  const biImmoCorp    = _A('immoCorp');
  const biImmoFin     = _A('immoFin');
  const biStocks      = _A('stocks');
  const biClients     = _A('clients');
  const biCreancesExp = _A('creancesExp');
  const biCreanceFisc = _A('creanceFisc');
  const biAutresCre   = _A('autresCre');
  const biRegulA      = _A('regulA');
  const biTreso       = _A('treso');
  const biAutresActif = _A('autresActif');

  const totalActifImmo = biImmoIncorp + biImmoCorp + biImmoFin;
  const totalActifCirc = biStocks + biClients + biCreancesExp + biCreanceFisc
                       + biAutresCre + biRegulA + biTreso + biAutresActif;
  const totalActif     = totalActifImmo + totalActifCirc;

  const biCapital     = _P('capital');
  const biPrimesRes   = _P('primesRes');
  const biReserves    = _P('reserves');
  const biReport      = _P('report');
  const biSubvInv     = _P('subvInv');
  const biResultat    = plNet;
  const biProvRegl    = _P('provRegl');
  const biProvisions  = _P('provisions');
  const biDetteFin    = _P('detteFin');
  const biDetteFrs    = _P('detteFrs');
  const biClientsCred = _P('clientsCred');
  const biDetteSoc    = _P('detteSoc');
  const biDetteFisc   = _P('detteFisc');
  const biAutresDettes= _P('autresDettes');
  const biRegulP      = _P('regulP');
  const biDecouvert   = _P('decouvert');

  const cpTotal   = biCapital+biPrimesRes+biReserves+biReport+biSubvInv+biResultat;
  const provTotal = biProvRegl+biProvisions;
  const detTotal  = biDetteFin+biDetteFrs+biClientsCred+biDetteSoc+biDetteFisc
                  + biAutresDettes+biRegulP+biDecouvert;
  const totalPassif = cpTotal+provTotal+detTotal;
  const bilanDiff   = Math.round(totalActif-totalPassif); // 0 si FEC ΣD=ΣC

  const bilan = {
    immoIncorp:biImmoIncorp, immoCorp:biImmoCorp, immoFin:biImmoFin,
    stocks:biStocks, clients:biClients,
    creancesExp:biCreancesExp, creanceFisc:biCreanceFisc,
    autresCre:biAutresCre, regulA:biRegulA,
    treso:biTreso, autresActif:biAutresActif,
    totalActifImmo, totalActifCirc, totalActif,
    capital:biCapital, primesRes:biPrimesRes, reserves:biReserves,
    report:biReport, resultat:biResultat, subvInv:biSubvInv,
    provRegl:biProvRegl, provisions:biProvisions,
    detteFin:biDetteFin, detteFrs:biDetteFrs, clientsCred:biClientsCred,
    detteSoc:biDetteSoc, detteFisc:biDetteFisc,
    autresDettes:biAutresDettes, regulP:biRegulP, decouvert:biDecouvert,
    cpTotal, provTotal, detTotal, totalPassif, diff:bilanDiff,
  };

  const treso=biTreso;
  const actifImmo=totalActifImmo, stocks=biStocks, creances=biClients,
        autCre=biCreancesExp+biCreanceFisc+biAutresCre,
        cp=cpTotal, dFin=biDetteFin, frs=biDetteFrs, dSoc=biDetteSoc;

  const chargesStructure=[
    {name:'Achats',value:Math.abs(v.achats||0)},
    {name:'Services ext.',value:Math.abs(v.sext||0)},
    {name:'Personnel',value:Math.abs(v.perso||0)},
    {name:'Impôts & taxes',value:Math.abs(v.taxes||0)},
    {name:'Financières',value:Math.abs(v.cfinc||0)},
    {name:'Dotations',value:Math.abs(v.dot||0)},
    {name:'Autres',value:Math.abs(v.autch||0)},
  ].filter(c=>c.value>50);

  let year=new Date().getFullYear();
  for(const e of entries){if(e.date&&e.date.length>=4){const y=parseInt(e.date.substring(0,4));if(y>2000&&y<=2030){year=y;break;}}}

  // ── Trésorerie journalière ────────────────────────────────────────────
  const tresoJournaliere = computeTresoJournaliere(entries);

  return{...v, mensuel, monthSIG, bilan, actifImmo, stocks, creances, autCre, treso, cp, dFin, frs, dSoc, chargesStructure, year, tresoJournaliere};
}

// Reconstruit le solde de trésorerie jour par jour depuis les mouvements 51x/52x/53x/54x
function computeTresoJournaliere(entries){
  // 1. Collecter tous les mouvements sur comptes tréso
  const mouvByDate = {};
  for(const e of entries){
    const isTreso = ['51','52','53','54'].some(px => e.compte.startsWith(px));
    if(!isTreso) continue;
    const dt = e.date;
    if(!dt || dt.length < 8) continue;
    const key = dt.substring(0,8); // YYYYMMDD
    if(!mouvByDate[key]) mouvByDate[key] = {entrees:0, sorties:0, details:[]};
    const net = e.debit - e.credit; // débit = encaissement, crédit = décaissement
    if(net > 0) mouvByDate[key].entrees += net;
    else mouvByDate[key].sorties += Math.abs(net);
    if(Math.abs(net) > 10) mouvByDate[key].details.push({lib: e.ecLib||e.lib, montant: net, compte: e.compte});
  }

  // 2. Trier les dates et construire le solde cumulé
  const dates = Object.keys(mouvByDate).sort();
  if(!dates.length) return [];

  let solde = 0;
  const serie = [];
  for(const dt of dates){
    const mv = mouvByDate[dt];
    solde += mv.entrees - mv.sorties;
    const y=dt.substring(0,4), m=dt.substring(4,6), d=dt.substring(6,8);
    serie.push({
      date: dt,
      dateF: `${d}/${m}/${y}`,
      dateSort: dt,
      solde: Math.round(solde),
      entrees: Math.round(mv.entrees),
      sorties: Math.round(mv.sorties),
      net: Math.round(mv.entrees - mv.sorties),
      details: mv.details.slice(0,5),
    });
  }
  return serie;
}

// ═══════════════════════════════ HELPERS ═══════════════════════════════════
const fmt=(n,compact)=>{
  if(n===undefined||n===null||isNaN(n))return'—';
  if(compact){
    if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2).replace('.',',')+' M€';
    if(Math.abs(n)>=1000)return Math.round(n/1000).toLocaleString('fr-FR')+' k€';
  }
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
};
const pct=(n,ref)=>(!ref||ref===0||isNaN(n)||isNaN(ref))?'':(n/ref*100).toFixed(1)+'%';
const evol=(n,n1)=>{if(n1===undefined||n1===null||n1===0||isNaN(n)||isNaN(n1))return null;return((n-n1)/Math.abs(n1)*100).toFixed(1);};

const MOIS_FULL=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function DrillPanel({entries,sigRow,dn,onClose}){
  const[selCompte,setSelCompte]=useState(null);
  const[search,setSearch]=useState('');

  const byCompte=useMemo(()=>{
    if(!sigRow||!entries)return[];
    const map={};
    for(const e of entries){
      for(const px of (sigRow.prefixes||[])){
        if(e.compte.startsWith(px)){
          const k=e.compte;
          if(!map[k])map[k]={compte:k,lib:e.lib,debit:0,credit:0,entries:[]};
          map[k].debit+=e.debit;map[k].credit+=e.credit;map[k].entries.push(e);
          break;
        }
      }
    }
    return Object.values(map).sort((a,b)=>Math.abs(b.credit-b.debit)-Math.abs(a.credit-a.debit));
  },[entries,sigRow]);

  const compteEntries=useMemo(()=>{
    if(!selCompte)return[];
    const found=byCompte.find(c=>c.compte===selCompte);
    if(!found)return[];
    return found.entries.filter(e=>search===''||e.ecLib.toLowerCase().includes(search.toLowerCase())||e.date.includes(search));
  },[byCompte,selCompte,search]);

  if(!sigRow)return null;

    <div style={{position:'fixed',top:0,right:0,bottom:0,width:'min(680px,95vw)',background:C.surf,borderLeft:`1px solid ${C.borderL}`,zIndex:200,display:'flex',flexDirection:'column',boxShadow:'-8px 0 40px rgba(0,0,0,.5)'}} className="sr">

      <div style={{padding:'20px 24px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',background:C.card}}>

          <div style={{fontSize:13,color:C.sub,fontWeight:500,marginBottom:4}}>Détail → {sigRow.label}</div>
          <div style={{fontSize:22,fontFamily:"'DM Serif Display'",color:sigRow.net>=0?C.goldL:C.red}}>{fmt(sigRow.net)}</div>
        </div>
        <button onClick={()=>{setSelCompte(null);onClose();}} style={{background:'none',border:'none',color:C.sub,fontSize:22,cursor:'pointer',padding:8,borderRadius:8,transition:'background .15s'}} onMouseEnter={e=>e.target.style.background=C.border} onMouseLeave={e=>e.target.style.background='none'}>✕</button>
      </div>

      {/* Compte list */}
      <div style={{padding:'16px 24px',borderBottom:`1px solid ${C.border}`,flex:'0 0 auto',maxHeight:320,overflowY:'auto'}}>
        <div style={{fontSize:11,color:C.sub,fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Comptes contribuant ({byCompte.length})</div>
        {byCompte.map(c=>{
          const n=sigRow.sign==='debit'?c.debit-c.credit:c.credit-c.debit;
          const isSelected=selCompte===c.compte;
          return(
            <div key={c.compte} onClick={()=>setSelCompte(isSelected?null:c.compte)}
              style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',marginBottom:4,borderRadius:10,cursor:'pointer',border:`1px solid ${isSelected?C.goldL:C.border}`,background:isSelected?`${C.gold}12`:C.bg,transition:'all .18s'}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontFamily:"'DM Mono'",fontSize:12,color:C.blue,fontWeight:500}}>{c.compte}</span>
                <span style={{fontSize:13,color:C.sub}}>{c.lib}</span>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:11,color:C.muted}}>{c.entries.length} écr.</span>
                <span style={{fontFamily:"'DM Mono'",fontSize:13,fontWeight:600,color:n>=0?C.text:C.red}}>{fmt(n,true)}</span>
                <span style={{fontSize:11,color:isSelected?C.goldL:C.muted}}>{isSelected?'▼':'▶'}</span>

          );

            <span style={{fontSize:11,color:C.muted}}>{compteEntries.length} lignes</span>
            <div style={{flex:1}}/>

              style={{background:C.card,border:`1px solid ${C.borderL}`,borderRadius:7,padding:'5px 12px',color:C.text,fontSize:12,width:160}}/>

                      <td style={{padding:'8px 16px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,fontWeight:600,color:C.text}}>{fmt(e.credit-e.debit,true)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {!selCompte&&byCompte.length>0&&(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:13}}>
          ← Cliquer un compte pour voir ses écritures
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════ MONTHLY ANALYSE ══════════════════════════
function MensuelAnalyse({dn,dn1,yearN}){
  const[selMois,setSelMois]=useState(null);
  const[view,setView]=useState('chart');

  const data=MOIS.map((m,i)=>{
    const k=String(i+1).padStart(2,'0');
    const ms=dn.monthSIG[k]||{};
    const ms1=dn1?.monthSIG?.[k]||{};
    const ca=Math.round(ms.ca||0);
    const ca1=dn1?Math.round(ms1.ca||0):0;
    const perso=Math.abs(Math.round(ms.perso||0));
    const perso1=dn1?Math.abs(Math.round(ms1.perso||0)):0;
    const mb=Math.round(ms.mb||0);
    const mb1=dn1?Math.round(ms1.mb||0):0;
    return{
      name:m,k,
      CA:ca, EBE:Math.round(ms.ebe||0), REX:Math.round(ms.rex||0), RN:Math.round(ms.rnet||0),
      CA1:ca1, EBE1:dn1?Math.round(ms1.ebe||0):0,
      // Nouveaux indicateurs
      ratioCASal: perso>0?Math.round(ca/perso*100):0,
      ratioCASal1: perso1>0&&ca1>0?Math.round(ca1/perso1*100):0,
      tauxMarge: ca>0?Math.round(mb/ca*100):0,
      tauxMarge1: ca1>0&&mb1!==0?Math.round(mb1/ca1*100):0,
    };
  });

  // Cumulé — sans REX N-1
  const cumul=[];
  let cumCA=0,cumEBE=0,cumREX=0,cumCA1=0,cumEBE1=0;
  data.forEach(d=>{
    cumCA+=d.CA;cumEBE+=d.EBE;cumREX+=d.REX;cumCA1+=d.CA1;cumEBE1+=d.EBE1;
    cumul.push({name:d.name,CA:cumCA,EBE:cumEBE,REX:cumREX,CA1:cumCA1,EBE1:cumEBE1});
  });

  const TV=['chart','cumul','table'];
  const TL=['Mensuel','Cumulé','Tableau'];
  const tt={contentStyle:{background:C.surf,border:`1px solid ${C.borderL}`,borderRadius:10,color:C.text,fontSize:12},cursor:{stroke:`${C.gold}30`,strokeWidth:1}};

  const ChartCard=({title,sub,color,children})=>(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
      <div style={{fontSize:13,fontWeight:700,color,marginBottom:4}}>{title}</div>
      <div style={{fontSize:11,color:C.sub,marginBottom:18}}>{sub}</div>
      {children}
    </div>
  );

  return(
    <div>
      <div style={{display:'flex',gap:4,marginBottom:20,background:C.surf,padding:4,borderRadius:10,width:'fit-content',border:`1px solid ${C.border}`}}>
        {TV.map((v,i)=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?C.borderL:'transparent',border:'none',borderRadius:7,padding:'6px 16px',color:view===v?C.text:C.sub,fontSize:12,fontWeight:view===v?600:400,cursor:'pointer',transition:'all .18s'}}>{TL[i]}</button>
        ))}
      </div>

      {view==='chart'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

          {/* CA mensuel */}
          <ChartCard title="CA mensuel" sub={`${yearN}${dn1?` vs ${yearN-1}`:''}`} color={C.blueL}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data} barCategoryGap="28%" barGap={3}>
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
                <Tooltip {...tt} formatter={(v,nm)=>[fmt(v),nm==='CA'?yearN:yearN-1]}/>
                <Bar dataKey="CA" fill={C.blue} radius={[4,4,0,0]} maxBarSize={36}/>
                {dn1&&<Bar dataKey="CA1" fill={C.muted} radius={[4,4,0,0]} maxBarSize={36}/>}
              </BarChart>
            </ResponsiveContainer>
          </ChartCard>

          {/* EBE mensuel */}
          <ChartCard title="EBE mensuel" sub="Excédent Brut d'Exploitation" color={C.goldL}>
            <ResponsiveContainer width="100%" height={200}>
              <AreaChart data={data}>
                <defs>
                  <linearGradient id="gEBE" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={C.gold} stopOpacity={0.3}/><stop offset="95%" stopColor={C.gold} stopOpacity={0.02}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
                <Tooltip {...tt} formatter={(v,nm)=>[fmt(v),nm==='EBE'?'EBE '+yearN:'EBE '+(yearN-1)]}/>
                <ReferenceLine y={0} stroke={C.muted} strokeDasharray="3 3"/>
                <Area type="monotone" dataKey="EBE" stroke={C.gold} strokeWidth={2} fill="url(#gEBE)"/>
                {dn1&&<Area type="monotone" dataKey="EBE1" stroke={C.muted} strokeWidth={1.5} strokeDasharray="4 2" fill="none"/>}
              </AreaChart>
            </ResponsiveContainer>
          </ChartCard>

          {/* REX mensuel */}
          <ChartCard title="Résultat d'exploitation mensuel" sub="REX par mois" color={C.green}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data} barCategoryGap="35%">
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
                <Tooltip {...tt} formatter={v=>[fmt(v),'REX']}/>
                <ReferenceLine y={0} stroke={C.muted} strokeDasharray="3 3"/>
                <Bar dataKey="REX" radius={[4,4,0,0]} maxBarSize={40}>
                  {data.map((d,i)=><Cell key={i} fill={d.REX>=0?C.green:C.red}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </ChartCard>

          {/* % EBE/CA */}
          <ChartCard title="% EBE/CA mensuel" sub="Taux de marge EBE" color={C.purple}>
            <ResponsiveContainer width="100%" height={200}>
              <AreaChart data={data.map(d=>({name:d.name,pct:d.CA>0?Math.round(d.EBE/d.CA*100):0,pct1:dn1&&d.CA1>0?Math.round(d.EBE1/d.CA1*100):0}))}>
                <defs>
                  <linearGradient id="gPCT" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={C.purple} stopOpacity={0.25}/><stop offset="95%" stopColor={C.purple} stopOpacity={0.02}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v+'%'}/>
                <Tooltip {...tt} formatter={(v,nm)=>[v+'%',nm==='pct'?'EBE/CA '+yearN:'EBE/CA '+(yearN-1)]}/>
                <ReferenceLine y={0} stroke={C.muted} strokeDasharray="3 3"/>
                <Area type="monotone" dataKey="pct" stroke={C.purple} strokeWidth={2} fill="url(#gPCT)"/>
                {dn1&&<Area type="monotone" dataKey="pct1" stroke={C.muted} strokeWidth={1.5} strokeDasharray="4 2" fill="none" dot={false}/>}
              </AreaChart>
            </ResponsiveContainer>
          </ChartCard>

          {/* NOUVEAU : CA / Masse salariale */}
          <ChartCard title="CA / Masse salariale" sub={`Ratio productivité — idéal > 3x · ${yearN}${dn1?` vs ${yearN-1}`:''}`} color={C.teal}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data} barCategoryGap="28%" barGap={3}>
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v+'%'}/>
                <Tooltip {...tt} formatter={(v,nm)=>[v+'%',nm==='ratioCASal'?'CA/Sal '+yearN:'CA/Sal '+(yearN-1)]}/>
                <ReferenceLine y={300} stroke={C.teal} strokeDasharray="3 3" strokeOpacity={0.4}/>
                <Bar dataKey="ratioCASal" name={`CA/Sal ${yearN}`} fill={C.teal} radius={[4,4,0,0]} maxBarSize={36}/>
                {dn1&&<Bar dataKey="ratioCASal1" name={`CA/Sal ${yearN-1}`} fill={C.muted} radius={[4,4,0,0]} maxBarSize={36}/>}
              </BarChart>
            </ResponsiveContainer>
          </ChartCard>

          {/* NOUVEAU : Taux de marge brute mensuel */}
          <ChartCard title="Taux de marge brute" sub={`MB/CA mensuel · ${yearN}${dn1?` vs ${yearN-1}`:''}`} color={C.orange}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data} barCategoryGap="28%" barGap={3}>
                <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
                <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v+'%'}/>
                <Tooltip {...tt} formatter={(v,nm)=>[v+'%',nm==='tauxMarge'?'Marge brute '+yearN:'Marge brute '+(yearN-1)]}/>
                <ReferenceLine y={0} stroke={C.muted} strokeDasharray="3 3"/>
                <Bar dataKey="tauxMarge" name={`Marge ${yearN}`} fill={C.orange} radius={[4,4,0,0]} maxBarSize={36}>
                  {data.map((d,i)=><Cell key={i} fill={d.tauxMarge>=0?C.orange:C.red}/>)}
                </Bar>
                {dn1&&<Bar dataKey="tauxMarge1" name={`Marge ${yearN-1}`} fill={C.muted} radius={[4,4,0,0]} maxBarSize={36}/>}
              </BarChart>
            </ResponsiveContainer>
          </ChartCard>

        </div>
      )}

      {view==='cumul'&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:C.goldL,marginBottom:4}}>Trajectoire cumulée {yearN}</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:24}}>CA et EBE — progression annuelle{dn1?` vs ${yearN-1}`:''}</div>
          <ResponsiveContainer width="100%" height={340}>
            <ComposedChart data={cumul}>
              <defs>
                <linearGradient id="gCA" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.blue} stopOpacity={0.15}/><stop offset="95%" stopColor={C.blue} stopOpacity={0}/>
                </linearGradient>
                <linearGradient id="gEBEc" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.gold} stopOpacity={0.2}/><stop offset="95%" stopColor={C.gold} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="2 4" stroke={C.border} vertical={false}/>
              <XAxis dataKey="name" stroke={C.muted} tick={{fill:C.sub,fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis stroke={C.muted} tick={{fill:C.sub,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
              <Tooltip {...tt} formatter={(v,nm)=>[fmt(v),nm]}/>
              <Legend wrapperStyle={{fontSize:12,color:C.sub,paddingTop:12}}/>
              <Area type="monotone" dataKey="CA"  name={`CA ${yearN}`}  stroke={C.blue} strokeWidth={2} fill="url(#gCA)"/>
              <Area type="monotone" dataKey="EBE" name={`EBE ${yearN}`} stroke={C.gold} strokeWidth={2} fill="url(#gEBEc)"/>
              {dn1&&<Line type="monotone" dataKey="CA1"  name={`CA ${yearN-1}`}  stroke={C.blue} strokeWidth={1.5} strokeDasharray="4 3" dot={false} opacity={0.45}/>}
              {dn1&&<Line type="monotone" dataKey="EBE1" name={`EBE ${yearN-1}`} stroke={C.gold} strokeWidth={1.5} strokeDasharray="4 3" dot={false} opacity={0.45}/>}
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      )}

      {view==='table'&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden'}}>
          <table>
            <thead>
              <tr>
                {[
                  {h:'Mois',       align:'left'},
                  {h:'CA',         align:'right'},
                  {h:'vs N-1',     align:'right'},
                  {h:'Marge brute',align:'right'},
                  {h:'% Marge',    align:'right'},
                  {h:'EBE',        align:'right'},
                  {h:'% EBE/CA',   align:'right'},
                  {h:'REX',        align:'right'},
                  {h:'% REX/CA',   align:'right'},
                  {h:'Rés. Net',   align:'right'},
                ].map(({h,align},i)=>(
                  <th key={h} style={{padding:'11px 12px',textAlign:align,color:C.sub,fontSize:10,fontWeight:700,background:C.surf,borderBottom:`1px solid ${C.borderL}`,textTransform:'uppercase',letterSpacing:0.7,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.map((d,i)=>{
                const k=d.k;
                const ms=dn.monthSIG[k]||{};
                const mb=ms.mb||0;
                const pctMarge=d.CA>0?(mb/d.CA*100):0;
                const margeColor=pctMarge>30?C.green:pctMarge>15?C.goldL:pctMarge>0?C.orange:C.red;
                return(
                  <tr key={k} onClick={()=>setSelMois(selMois===k?null:k)}
                    style={{cursor:'pointer',background:selMois===k?`${C.gold}10`:i%2?'rgba(255,255,255,.007)':'transparent',borderBottom:`1px solid ${C.border}`,transition:'background .12s'}}>
                    <td style={{padding:'10px 12px',fontWeight:600,color:selMois===k?C.goldL:C.text,fontSize:13}}>{MOIS_FULL[i]}</td>
                    {/* CA */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:C.text}}>{fmt(d.CA)}</td>
                    {/* % vs N-1 */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:d.CA>d.CA1&&dn1?C.green:dn1?C.red:C.muted}}>{dn1&&d.CA1>0?((d.CA-d.CA1)/d.CA1*100).toFixed(1)+'%':'—'}</td>
                    {/* Marge brute */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:mb>=0?C.text:C.red,fontWeight:600}}>{fmt(mb)}</td>
                    {/* % Marge / CA — avec barre visuelle */}
                    <td style={{padding:'6px 12px',textAlign:'right'}}>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                        <span style={{fontSize:12,fontWeight:700,color:margeColor}}>{d.CA>0?pctMarge.toFixed(1)+'%':'—'}</span>
                        <div style={{width:52,height:4,background:C.border,borderRadius:2}}>
                          <div style={{height:'100%',width:`${Math.min(100,Math.max(0,pctMarge))}%`,background:margeColor,borderRadius:2,transition:'width .4s'}}/>
                        </div>
                      </div>
                    </td>
                    {/* EBE */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:d.EBE>=0?C.goldL:C.red}}>{fmt(d.EBE)}</td>
                    {/* % EBE/CA */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:C.muted}}>{d.CA>0?(d.EBE/d.CA*100).toFixed(1)+'%':'—'}</td>
                    {/* REX */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:(ms.rex||0)>=0?C.green:C.red}}>{fmt(ms.rex)}</td>
                    {/* % REX/CA */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:C.muted}}>{d.CA>0?((ms.rex||0)/d.CA*100).toFixed(1)+'%':'—'}</td>
                    {/* Résultat net */}
                    <td style={{padding:'10px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,fontWeight:600,color:(ms.rnet||0)>=0?C.green:C.red}}>{fmt(ms.rnet)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:C.surf,borderTop:`1px solid ${C.borderL}`}}>
                <td style={{padding:'11px 12px',fontWeight:700,color:C.goldL,fontSize:13}}>TOTAL</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:C.text,fontSize:13}}>{fmt(dn.ca)}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontSize:11,color:dn1&&dn.ca>dn1.ca?C.green:C.red}}>{dn1?evol(dn.ca,dn1.ca)+'%':'—'}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:C.text,fontSize:13}}>{fmt(dn.mb)}</td>
                <td style={{padding:'11px 12px',textAlign:'right'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                    <span style={{fontSize:12,fontWeight:700,color:dn.ca>0&&(dn.mb/dn.ca)>0.3?C.green:(dn.mb/dn.ca)>0.15?C.goldL:C.orange}}>
                      {dn.ca>0?((dn.mb||0)/dn.ca*100).toFixed(1)+'%':'—'}
                    </span>
                    <div style={{width:52,height:4,background:C.border,borderRadius:2}}>
                      <div style={{height:'100%',width:`${Math.min(100,Math.max(0,dn.ca>0?(dn.mb||0)/dn.ca*100:0))}%`,background:C.goldL,borderRadius:2}}/>
                    </div>
                  </div>
                </td>
                <td style={{padding:'11px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:C.goldL,fontSize:13}}>{fmt(dn.ebe)}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontSize:11,color:C.muted}}>{pct(dn.ebe,dn.ca)}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:dn.rex>=0?C.green:C.red,fontSize:13}}>{fmt(dn.rex)}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontSize:11,color:C.muted}}>{pct(dn.rex,dn.ca)}</td>
                <td style={{padding:'11px 12px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:dn.rnet>=0?C.green:C.red,fontSize:13}}>{fmt(dn.rnet)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════ DRILL TABLE CHARGES ═════════════════════
function DrillTable({selCharge,monthlyData,totalN1,activeColor,dn1,onClose}){
  const totalN=monthlyData.reduce((a,d)=>a+d.N,0)||1;
  const footEv=dn1&&totalN1>0?((totalN-totalN1)/totalN1*100).toFixed(1):null;
  const footGood=footEv!==null&&parseFloat(footEv)<=0;
  return(
    <div style={{background:C.card,border:`1px solid ${activeColor}40`,borderRadius:16,overflow:'hidden'}} className="sl">
      <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:`${activeColor}08`}}>
        <div>
          <span style={{fontSize:13,fontWeight:700,color:activeColor}}>Détail mensuel — {selCharge}</span>
          <span style={{fontSize:11,color:C.sub,marginLeft:12}}>Mois par mois</span>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.sub,fontSize:18,cursor:'pointer'}}>✕</button>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr>
            {['Mois','N','% du total','vs N-1','Évol.'].map((h,i)=>(
              <th key={h} style={{padding:'9px 16px',textAlign:i===0?'left':'right',color:C.sub,fontSize:10,fontWeight:700,background:C.surf,borderBottom:`1px solid ${C.borderL}`,textTransform:'uppercase',letterSpacing:0.7,whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {monthlyData.map((d,i)=>{
            const ev=d.N1>0?((d.N-d.N1)/d.N1*100).toFixed(1):null;
            const evGood=ev!==null&&parseFloat(ev)<=0;
            return(
              <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2?'rgba(255,255,255,.005)':'transparent'}}>
                <td style={{padding:'8px 16px',fontWeight:500,color:C.text,fontSize:13}}>{MOIS_FULL[i]}</td>
                <td style={{padding:'8px 16px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:d.N>0?activeColor:C.muted,fontWeight:600}}>{d.N>0?fmt(d.N):'—'}</td>
                <td style={{padding:'8px 16px',textAlign:'right',fontSize:11,color:C.muted}}>{d.N>0?(d.N/totalN*100).toFixed(1)+'%':'—'}</td>
                <td style={{padding:'8px 16px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:C.sub}}>{d.N1>0?fmt(d.N1):'—'}</td>
                <td style={{padding:'8px 16px',textAlign:'right',fontSize:11}}>
                  {ev!==null&&<span style={{color:evGood?C.green:C.red,fontWeight:700}}>{evGood?'▼':'▲'} {Math.abs(ev)}%</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{background:C.surf,borderTop:`1px solid ${C.borderL}`}}>
            <td style={{padding:'10px 16px',fontWeight:700,color:activeColor,fontSize:13}}>TOTAL</td>
            <td style={{padding:'10px 16px',textAlign:'right',fontFamily:"'DM Mono'",fontWeight:700,color:activeColor,fontSize:13}}>{fmt(totalN)}</td>
            <td style={{padding:'10px 16px',textAlign:'right',fontSize:11,color:C.muted}}>100%</td>
            <td style={{padding:'10px 16px',textAlign:'right',fontFamily:"'DM Mono'",fontSize:12,color:C.sub}}>{dn1?fmt(totalN1):'—'}</td>
            <td style={{padding:'10px 16px',textAlign:'right',fontSize:11}}>
              {footEv!==null&&<span style={{color:footGood?C.green:C.red,fontWeight:700}}>{footGood?'▼':'▲'} {Math.abs(footEv)}%</span>}
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

// ═══════════════════════════════ CHARGES ══════════════════════════════════
function ChargesPanel({dn,dn1,yearN}){
  const[selCharge,setSelCharge]=useState(null);
  const[chartMode,setChartMode]=useState('mensuel');
  const[drillOpen,setDrillOpen]=useState(false);

  const sorted=useMemo(()=>
    [...dn.chargesStructure].sort((a,b)=>b.value-a.value)
  ,[dn]);
  const total=sorted.reduce((a,c)=>a+c.value,0);

  const SIG_KEY={'Achats':'achats','Services ext.':'sext','Personnel':'perso','Impôts & taxes':'taxes','Financières':'cfinc','Dotations':'dot','Autres':'autch'};

  const monthlyData=useMemo(()=>{
    if(!selCharge)return[];
    const key=SIG_KEY[selCharge];
    return MOIS.map((m,i)=>{
      const mk=String(i+1).padStart(2,'0');
      const ms=dn.monthSIG[mk]||{};
      const ms1=dn1?.monthSIG?.[mk]||{};
      return{name:m,mk,N:Math.abs(Math.round(ms[key]||0)),N1:dn1?Math.abs(Math.round(ms1[key]||0)):0};
    });
  },[selCharge,dn,dn1]);

  const cumulData=useMemo(()=>{
    let sN=0,sN1=0;
    return monthlyData.map(d=>({name:d.name,N:sN+=d.N,N1:sN1+=d.N1}));
  },[monthlyData]);

  const annuelData=useMemo(()=>{
    if(!selCharge)return[];
    const tN=monthlyData.reduce((a,d)=>a+d.N,0);
    const tN1=monthlyData.reduce((a,d)=>a+d.N1,0);
    return dn1
      ? [{name:String(yearN-1),val:tN1,yr:yearN-1},{name:String(yearN),val:tN,yr:yearN}]
      : [{name:String(yearN),val:tN,yr:yearN}];
  },[monthlyData,selCharge,dn1,yearN]);

  const totalN1=useMemo(()=>{
    if(!selCharge||!dn1)return 0;
    const key=SIG_KEY[selCharge];
    return Math.abs(Object.values(dn1.monthSIG||{}).reduce((a,ms)=>a+Math.abs(ms[key]||0),0));
  },[selCharge,dn1]);

  const chartData=chartMode==='cumul'?cumulData:chartMode==='annuel'?annuelData:monthlyData;
  const selIdx=sorted.findIndex(c=>c.name===selCharge);
  const activeColor=selIdx>=0?PIE[selIdx%PIE.length]:C.gold;
  const handleSelect=name=>{if(selCharge===name){setSelCharge(null);setDrillOpen(false);}else{setSelCharge(name);setDrillOpen(false);}};

  const PieTooltip=({active,payload})=>{
    if(!active||!payload?.[0])return null;
    const{name,value}=payload[0].payload;
    const idx=sorted.findIndex(c=>c.name===name);
    const col=PIE[idx%PIE.length];
    return(
      <div style={{background:'#111827',border:`1px solid ${col}50`,borderRadius:10,padding:'12px 16px',minWidth:180,boxShadow:'0 8px 24px rgba(0,0,0,.7)'}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
          <span style={{width:10,height:10,borderRadius:'50%',background:col,display:'inline-block'}}/>
          <span style={{fontSize:12,fontWeight:700,color:C.text}}>{name}</span>
        </div>
        <div style={{fontSize:18,fontWeight:800,fontFamily:"'DM Mono'",color:col,marginBottom:4}}>{fmt(value)}</div>
        <div style={{fontSize:11,color:'#9CA3AF'}}>{(value/total*100).toFixed(1)}% du total charges</div>
      </div>
    );
  };

  const tt={contentStyle:{background:'#111827',border:'1px solid #374151',borderRadius:10,color:C.text,fontSize:12},cursor:{fill:'rgba(255,255,255,0.04)'}};
  const MODES=[{k:'mensuel',l:'Mensuel'},{k:'cumul',l:'Cumulé'}];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Donut */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:C.goldL,marginBottom:2}}>Répartition des charges</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:16}}>Survoler pour le montant · cliquer pour l'analyse</div>
          <ResponsiveContainer width="100%" height={270}>
            <PieChart>
              <Pie data={sorted} cx="50%" cy="50%" innerRadius={70} outerRadius={115}
                dataKey="value" nameKey="name" paddingAngle={2} onClick={d=>handleSelect(d.name)}>
                {sorted.map((c,i)=>(
                  <Cell key={i} fill={PIE[i%PIE.length]}
                    opacity={selCharge&&selCharge!==c.name?0.3:1}
                    stroke={selCharge===c.name?'#fff':'none'} strokeWidth={2} style={{cursor:'pointer'}}/>
                ))}
              </Pie>
              <Tooltip content={<PieTooltip/>}/>
            </PieChart>
          </ResponsiveContainer>
        </div>

        {/* Barres horizontales */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:C.goldL,marginBottom:2}}>Détail par nature</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:20}}>
            Cliquer → graphique&nbsp;
            {selCharge&&<span style={{color:C.blue,cursor:'pointer',fontWeight:600}} onClick={()=>setDrillOpen(o=>!o)}>[{drillOpen?'▲ fermer tableau':'▼ tableau détail'}]</span>}
          </div>
          {sorted.map((c,i)=>{
            const isActive=selCharge===c.name;
            const col=PIE[i%PIE.length];
            const n1v=dn1?Math.abs(Object.values(dn1.monthSIG||{}).reduce((a,ms)=>a+Math.abs(ms[SIG_KEY[c.name]]||0),0)):0;
            const ep=n1v>0?((c.value-n1v)/n1v*100).toFixed(1):null;
            return(
              <div key={i} style={{marginBottom:10,cursor:'pointer',padding:'7px 10px',borderRadius:9,border:`1px solid ${isActive?col+'60':C.border}`,background:isActive?`${col}10`:'transparent',transition:'all .18s'}}
                onClick={()=>handleSelect(c.name)}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'center'}}>
                  <span style={{fontSize:12,color:isActive?C.text:C.sub,fontWeight:isActive?600:400,display:'flex',alignItems:'center',gap:7}}>
                    <span style={{width:9,height:9,borderRadius:'50%',background:col,display:'inline-block',flexShrink:0}}/>
                    {c.name}
                  </span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {ep!==null&&<span style={{fontSize:10,fontWeight:700,color:parseFloat(ep)>0?C.red:C.green}}>{parseFloat(ep)>0?'▲':'▼'}{Math.abs(ep)}%</span>}
                    <span style={{fontSize:12,color:isActive?col:C.text,fontWeight:600,fontFamily:"'DM Mono'"}}>{fmt(c.value)}</span>
                    <span style={{color:C.muted,fontWeight:400,fontSize:10}}>({(c.value/total*100).toFixed(1)}%)</span>
                  </div>
                </div>
                <div style={{height:5,background:C.border,borderRadius:3}}>
                  <div style={{height:'100%',width:`${c.value/total*100}%`,background:col,borderRadius:3,transition:'width .6s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Tableau drill */}
      {selCharge&&drillOpen&&(
        <DrillTable selCharge={selCharge} monthlyData={monthlyData} totalN1={totalN1}
          activeColor={activeColor} dn1={dn1} onClose={()=>setDrillOpen(false)}/>
      )}

      {/* Graphique dynamique */}
      <div style={{background:C.card,border:`1px solid ${selCharge?activeColor+'40':C.border}`,borderRadius:16,padding:24,transition:'border-color .2s'}}>
        {!selCharge?(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:160,color:C.muted,flexDirection:'column',gap:10}}>
            <span style={{fontSize:28,opacity:0.4}}>📊</span>
            <span style={{fontSize:13}}>Cliquer sur une nature de charges pour afficher son analyse</span>
          </div>
        ):(
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:activeColor}}>{selCharge}</div>
                <div style={{fontSize:11,color:C.sub,marginTop:2}}>
                  <span style={{color:C.text,fontWeight:600}}>{fmt(monthlyData.reduce((a,d)=>a+d.N,0))}</span> en {yearN}
                  {dn1&&<> · <span style={{color:C.sub}}>{fmt(totalN1)}</span> en {yearN-1}</>}
                </div>
              </div>
              <div style={{display:'flex',gap:3,background:C.surf,padding:3,borderRadius:9,border:`1px solid ${C.border}`}}>
                {MODES.map(mo=>(
                  <button key={mo.k} onClick={()=>setChartMode(mo.k)}
                    style={{background:chartMode===mo.k?C.borderL:'transparent',border:'none',borderRadius:6,padding:'5px 14px',color:chartMode===mo.k?C.text:C.sub,fontSize:12,fontWeight:chartMode===mo.k?600:400,cursor:'pointer',transition:'all .15s'}}>
                    {mo.l}
                  </button>
                ))}
              </div>
            </div>

            {chartMode==='annuel'?(
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={annuelData} barCategoryGap="50%" margin={{top:8,right:24,left:8,bottom:0}}>
                  <CartesianGrid strokeDasharray="2 5" stroke={C.border} vertical={false}/>
                  <XAxis dataKey="name" stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:14,fontWeight:700}} axisLine={false} tickLine={false}/>
                  <YAxis stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
                  <Tooltip {...tt} formatter={(v,nm,props)=>[fmt(v),props.payload?.name]}/>
                  <Bar dataKey="val" radius={[6,6,0,0]} maxBarSize={80}>
                    {annuelData.map((d,i)=>(<Cell key={i} fill={d.yr===yearN?activeColor:'#4B5563'}/>))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            ):(
              <ResponsiveContainer width="100%" height={240}>
                <BarChart data={chartData} barCategoryGap="25%" barGap={3} margin={{top:8,right:8,left:4,bottom:0}}>
                  <CartesianGrid strokeDasharray="2 5" stroke={C.border} vertical={false}/>
                  <XAxis dataKey="name" stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:10}} axisLine={false} tickLine={false}/>
                  <YAxis stroke={C.muted} tick={{fill:'#9CA3AF',fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?Math.round(v/1000)+'k':v}/>
                  <Tooltip {...tt} formatter={(v,nm)=>[fmt(v),nm==='N'?String(yearN):String(yearN-1)]}/>
                  <Bar dataKey="N" name={String(yearN)} fill={activeColor} radius={[4,4,0,0]} maxBarSize={32}/>
                  {dn1&&<Bar dataKey="N1" name={String(yearN-1)} fill="#4B5563" radius={[4,4,0,0]} maxBarSize={32}/>}
                </BarChart>
              </ResponsiveContainer>
            )}

            <div style={{marginTop:10,display:'flex',gap:20,fontSize:11,color:C.sub}}>
              <span style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{width:20,height:3,background:activeColor,display:'inline-block',borderRadius:2}}/>{yearN}
              </span>
              {dn1&&<span style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{width:20,height:2,background:'#6B7280',display:'inline-block',borderRadius:2}}/>{yearN-1}
              </span>}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════ BILAN ════════════════════════════════════
function BilanPanel({dn,dn1,yearN,entries}){
  const[expandedA,setExpandedA]=useState({immo:true,circ:true});
  const[expandedP,setExpandedP]=useState({cp:true,prov:false,det:true});
  const[bilanDrill,setBilanDrill]=useState(null); // {label, prefixes, sign}
  const b=dn.bilan||{};
  const b1=dn1?.bilan||null;

  const TIPS={
    immo:"Les actifs immobilisés représentent les investissements durables de l'entreprise (> 1 an). Ils sont la colonne vertébrale productive.",
    circ:"L'actif circulant tourne au rythme du cycle d'exploitation. Un stock ou une créance élevée peut signaler un besoin en fonds de roulement.",
    cp:"Les capitaux propres mesurent la solidité financière intrinsèque. Un ratio CP/Total passif > 30 % est généralement sain.",
    prov:"Les provisions traduisent la prudence : l'entreprise anticipe des risques ou charges futures même si leur montant est incertain.",
    det:"Les dettes financent l'activité mais ont un coût. L'équilibre dettes/capitaux propres (levier financier) est un indicateur clé.",
  };

  const evPct=(n,n1)=>{if(!n1||n1===0)return null;return((n-n1)/Math.abs(n1)*100).toFixed(1);};

  // Mapping label → prefixes for drill-down
  const BILAN_PREFIXES={
    'Immob. incorporelles & financières':['20','280','290'],
    'Immob. corporelles brutes':['21','22','23','24','25','281','282','283','284','285','291','292','293','294','295'],
    'Immob. financières (autres)':['26','27','286','287','288','296','297','298'],
    'Stocks & en-cours':['3','39'],
    'Créances clients nettes':['41','49'],
    'Créances d\'exploitation':['40','42','43'],
    'Créances fiscales & État':['44'],
    'Autres créances & comptes courants':['45','46'],
    'Régularisations actif':['47','48'],
    'Disponibilités & VMP':['50','51','52','53','54','59'],
    'Capital social':['101','102','103','104','105','108'],
    'Primes & réserves légales':['106','107'],
    'Autres réserves & report':['11','12'],
    'Résultat de l\'exercice':['6','7'],
    'Subventions d\'investissement':['13'],
    'Provisions réglementées':['14'],
    'Provisions risques/charges':['15'],
    'Emprunts & dettes financières':['16','17','18'],
    'Dettes fournisseurs':['40'],
    'Avances & acomptes clients':['419'],
    'Dettes sociales (personnel)':['42','43'],
    'Dettes fiscales':['44','45'],
    'Autres dettes':['46'],
    'Régularisations passif':['47','48'],
    'Découvert bancaire':['51','52','53'],
  };

  // BRow — cliquable si drill disponible, affiche N-1
  const BRow=({label,val,prev,color,indent,bold,note,italic})=>{
    const e=b1&&prev!==undefined?evPct(val,prev):null;
    const eUp=e!==null&&parseFloat(e)>=0;
    if(!val&&val!==0)return null;
    const pxs=BILAN_PREFIXES[label];
    const drillable=!!(pxs&&entries);
    return(
      <div onClick={drillable?()=>setBilanDrill({label,prefixes:pxs,net:val}):undefined}
        style={{display:'flex',alignItems:'center',padding:`${bold?'10px':'7px'} 0`,borderBottom:`1px solid ${C.border}`,gap:6,cursor:drillable?'pointer':'default',transition:'background .12s'}}
        className={drillable?'row-drill':''}>
        {indent&&<span style={{width:14,color:C.muted,fontSize:10,flexShrink:0}}>└─</span>}
        <div style={{flex:1,minWidth:0}}>
          <span style={{fontSize:bold?13:12,color:bold?C.text:C.sub,fontWeight:bold?600:400,fontStyle:italic?'italic':'normal'}}>{label}</span>
          {note&&<span style={{fontSize:10,color:C.muted,marginLeft:6,fontStyle:'italic'}}>{note}</span>}
        </div>
        {/* N-1 */}
        {b1&&prev!==undefined&&<span style={{fontFamily:"'DM Mono'",fontSize:11,color:'#566B80',flexShrink:0,minWidth:70,textAlign:'right'}}>{fmt(prev,true)}</span>}
        {/* Évol */}
        {e!==null&&<span style={{fontSize:10,color:eUp?C.green:C.red,fontWeight:700,flexShrink:0,minWidth:40,textAlign:'right'}}>{eUp?'▲':'▼'}{Math.abs(e)}%</span>}
        {/* N */}
        <span style={{fontFamily:"'DM Mono'",fontSize:bold?13:12,fontWeight:bold?700:400,color:val<0?C.red:bold?color:C.text,flexShrink:0,minWidth:80,textAlign:'right'}}>{fmt(val)}</span>
        {drillable&&<span style={{fontSize:10,color:C.blue,flexShrink:0}}>⤵</span>}
      </div>
    );
  };

  const SubTotal=({label,val,color})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 14px',marginTop:6,borderRadius:10,background:`${color}10`,border:`1px solid ${color}30`}}>
      <span style={{fontSize:12,fontWeight:700,color}}>{label}</span>
      <span style={{fontFamily:"'DM Mono'",fontSize:14,fontWeight:700,color}}>{fmt(val)}</span>
    </div>
  );

  const Section=({id,side,emoji,title,tip,color,expanded,onToggle,children,subtotal,prevTotal})=>{
    const e=b1&&prevTotal!==undefined?evPct(subtotal,prevTotal):null;
    const eUp=e!==null&&parseFloat(e)>=0;
    return(
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden',marginBottom:12}}>
        <div onClick={onToggle} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',cursor:'pointer',background:`${color}08`,borderBottom:expanded?`1px solid ${C.border}`:'none',transition:'background .15s'}}
          onMouseEnter={ev=>ev.currentTarget.style.background=`${color}12`}
          onMouseLeave={ev=>ev.currentTarget.style.background=`${color}08`}>
          <span style={{fontSize:20}}>{emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color,letterSpacing:'-0.2px'}}>{title}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2,fontStyle:'italic'}}>{tip}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {e!==null&&<span style={{fontSize:11,color:eUp?C.green:C.red,fontWeight:700}}>{eUp?'▲':'▼'}{Math.abs(e)}%</span>}
            <span style={{fontFamily:"'DM Mono'",fontSize:15,fontWeight:800,color}}>{fmt(subtotal,true)}</span>
            <span style={{fontSize:12,color:C.muted,marginLeft:4}}>{expanded?'▲':'▼'}</span>
          </div>
        </div>
        {expanded&&<div style={{padding:'8px 18px 14px'}}>
          {b1&&<div style={{display:'flex',justifyContent:'flex-end',gap:8,marginBottom:4,paddingBottom:4,borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:10,color:'#566B80',fontWeight:600,minWidth:70,textAlign:'right'}}>N-1</span>
            <span style={{fontSize:10,color:C.muted,minWidth:40,textAlign:'right'}}>Évol.</span>
            <span style={{fontSize:10,color:C.sub,fontWeight:600,minWidth:80,textAlign:'right'}}>N</span>
            <span style={{width:16}}/>
          </div>}
          {children}
        </div>}
      </div>
    );
  };

  const balanced = Math.abs(b.diff||0) < 1;

  // Barre d'équilibre visuelle
  const pctCP  = b.totalPassif>0 ? b.cpTotal/b.totalPassif*100 : 0;
  const pctProv = b.totalPassif>0 ? b.provTotal/b.totalPassif*100 : 0;
  const pctDet = b.totalPassif>0 ? b.detTotal/b.totalPassif*100 : 0;
  const pctImmo = b.totalActif>0 ? b.totalActifImmo/b.totalActif*100 : 0;
  const pctCirc = b.totalActif>0 ? b.totalActifCirc/b.totalActif*100 : 0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* ── Bandeau équilibre ───────────────────────────────────────── */}
      <div style={{background:C.card,border:`1px solid ${balanced?C.green:C.orange}40`,borderRadius:14,padding:'16px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18}}>{balanced?'⚖️':'⚠️'}</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:balanced?C.green:C.orange}}>
                {balanced ? 'Bilan équilibré ✓' : 'Écart de bouclement'}
              </div>
              <div style={{fontSize:11,color:C.muted}}>
                {balanced ? 'Actif = Passif — principe de la partie double respecté'
                  : `Diff. : ${fmt(Math.abs(b.diff||0),true)} — comptes non couverts dans le FEC`}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:24,alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:11,color:C.sub,fontWeight:600,marginBottom:2}}>TOTAL ACTIF</div>
              <div style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono'",color:C.blue}}>{fmt(b.totalActif,true)}</div>
            </div>
            <div style={{fontSize:20,color:C.muted}}>=</div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:11,color:C.sub,fontWeight:600,marginBottom:2}}>TOTAL PASSIF</div>
              <div style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono'",color:C.gold}}>{fmt(b.totalPassif,true)}</div>
            </div>
          </div>
        </div>

        {/* Barre de structure actif */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:C.sub,fontWeight:600,textTransform:'uppercase',letterSpacing:0.8,marginBottom:4}}>Structure Actif</div>
          <div style={{height:22,borderRadius:8,overflow:'hidden',display:'flex',background:C.border}}>
            <div style={{width:`${pctImmo}%`,background:C.blue,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,transition:'width .7s'}}>{pctImmo>8?`${pctImmo.toFixed(0)}%`:''}</div>
            <div style={{width:`${pctCirc}%`,background:`${C.blue}70`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,transition:'width .7s'}}>{pctCirc>8?`${pctCirc.toFixed(0)}%`:''}</div>
          </div>
          <div style={{display:'flex',gap:16,marginTop:4}}>
            <span style={{fontSize:10,color:C.blue}}>■ Immobilisé {pctImmo.toFixed(1)}%</span>
            <span style={{fontSize:10,color:`${C.blue}`}}>■ Circulant {pctCirc.toFixed(1)}%</span>
          </div>
        </div>

        {/* Barre de structure passif */}
        <div>
          <div style={{fontSize:10,color:C.sub,fontWeight:600,textTransform:'uppercase',letterSpacing:0.8,marginBottom:4}}>Structure Passif</div>
          <div style={{height:22,borderRadius:8,overflow:'hidden',display:'flex',background:C.border}}>
            <div style={{width:`${pctCP}%`,background:C.gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,transition:'width .7s'}}>{pctCP>8?`${pctCP.toFixed(0)}%`:''}</div>
            <div style={{width:`${pctProv}%`,background:C.orange,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,transition:'width .7s'}}>{pctProv>4?`${pctProv.toFixed(0)}%`:''}</div>
            <div style={{width:`${pctDet}%`,background:`${C.red}AA`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,transition:'width .7s'}}>{pctDet>8?`${pctDet.toFixed(0)}%`:''}</div>
          </div>
          <div style={{display:'flex',gap:16,marginTop:4}}>
            <span style={{fontSize:10,color:C.gold}}>■ Capitaux propres {pctCP.toFixed(1)}%</span>
            {pctProv>0&&<span style={{fontSize:10,color:C.orange}}>■ Provisions {pctProv.toFixed(1)}%</span>}

            <BRow label="— Amortissements & dépréciations"   val={b.biAmort}   prev={b1?.biAmort}   color={C.muted} indent italic note="Valeur consommée"/>
            <BRow label="Immob. financières (autres)"        val={b.immoFin}   prev={b1?.immoFin}   color={C.blue} indent note="Dépôts, cautionnements"/>

            <BRow label="Créances clients nettes"           val={b.clients}      prev={b1?.clients}      color={C.teal}  indent note="Factures non encaissées (net dépréciations)"/>

            <BRow label="Créances fiscales & État"          val={b.creanceFisc}  prev={b1?.creanceFisc}  color={C.teal}  indent note="TVA à récupérer, CIR, autres créances fiscales"/>
            <BRow label="Autres créances & comptes courants" val={b.autresCre}   prev={b1?.autresCre}    color={C.teal}  indent note="Groupe, associés, débiteurs divers"/>
            <BRow label="Régularisations actif"             val={b.regulA}       prev={b1?.regulA}       color={C.teal}  indent note="Charges constatées d'avance, comptes transitoires"/>
            <BRow label="Disponibilités & VMP"              val={b.treso}        prev={b1?.treso}        color={C.green} indent bold note="Banque, caisse, valeurs mobilières de placement"/>

          {/* Dettes */}
          <Section id="det" side="P" emoji="💳" title="Dettes" tip={TIPS.det}
            color={C.red} expanded={expandedP.det} subtotal={b.detTotal} prevTotal={b1?.detTotal}
            onToggle={()=>setExpandedP(p=>({...p,det:!p.det}))}>
            <BRow label="Emprunts & dettes financières" val={b.detteFin}     prev={b1?.detteFin}     color={C.red} indent bold note="Banques, obligations, dettes assimilées (cl.16-18)"/>
            <BRow label="Dettes fournisseurs"           val={b.detteFrs}     prev={b1?.detteFrs}     color={C.red} indent      note="Factures non réglées (cl.40)"/>
            {(b.clientsCred||0)>0&&<BRow label="Avances & acomptes clients" val={b.clientsCred} prev={b1?.clientsCred} color={C.red} indent note="Clients créditeurs (avances reçues, cl.419)"/>}
            <BRow label="Dettes sociales"               val={b.detteSoc}     prev={b1?.detteSoc}     color={C.red} indent      note="Personnel, URSSAF, caisses retraite (cl.42-43)"/>
            <BRow label="Dettes fiscales"               val={b.detteFisc}    prev={b1?.detteFisc}    color={C.red} indent      note="IS, TVA collectée, taxes (cl.44)"/>
            <BRow label="Autres dettes"                 val={b.autresDettes} prev={b1?.autresDettes} color={C.red} indent      note="Groupe, associés, créditeurs divers (cl.45-46)"/>
            <BRow label="Régularisations passif"        val={b.regulP}       prev={b1?.regulP}       color={C.red} indent      note="Produits constatés d'avance, comptes transitoires (cl.47-48)"/>

          {!balanced&&<div style={{background:`${C.orange}12`,border:`1px solid ${C.orange}30`,borderRadius:10,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

            <span style={{fontFamily:"'DM Mono'",fontSize:13,color:C.orange,fontWeight:600}}>{fmt(b.diff||0)}</span>
          </div>}

          {/* Total passif */}
          <div style={{background:`linear-gradient(135deg,${C.gold}18,${C.red}10)`,border:`1px solid ${C.gold}40`,borderRadius:12,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:14,fontWeight:800,color:C.gold}}>TOTAL PASSIF</span>
            <span style={{fontFamily:"'DM Mono'",fontSize:20,fontWeight:800,color:C.gold}}>{fmt(b.totalPassif)}</span>
          </div>
        </div>

      {/* ── Ratios clés ───────────────────────────────────────────── */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:'18px 22px'}}>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {(()=>{
            // Dettes CT = tout sauf emprunts LT (detteFin)
            const dettesCT = b.detteFrs + b.clientsCred + b.detteSoc + b.detteFisc
                           + b.autresDettes + b.regulP + b.decouvert;
            // Trésorerie nette = Disponibilités - Découvert
            const tresoNette = (b.treso||0) - (b.decouvert||0);
            const ratios = [
              {
                l:'Fonds de Roulement',
                v:fmt((b.cpTotal+b.provTotal+b.detteFin)-b.totalActifImmo,true),
                tip:'(CP + Provisions + Dettes LT) − Actif immobilisé · FR > 0 = excédent de ressources stables',
